# Tron managed default primitive profile, schema v3.
# Profiles retain only boot settings, auth selection, and sparse user
# inheritance. Prompt/process orchestration and product capability policy
# tables are not primitive profile data on this branch.

version = "3"
name = "default"
managed = true
profileClass = "base"
inherits = []
authProfile = "default"

# Managed server/iOS/RPC settings baseline.
[settings]
version = "0.1.0"
name = "tron"

[settings.api.anthropic]
authUrl = "https://claude.ai/oauth/authorize"
tokenUrl = "https://console.anthropic.com/v1/oauth/token"
redirectUri = "https://console.anthropic.com/oauth/code/callback"
clientId = "9d1c250a-e61b-44d9-88ed-5944d1962f5e"
scopes = ["org:create_api_key", "user:profile", "user:inference"]
systemPromptPrefix = "You are Claude Code, Anthropic's official CLI for Claude."
oauthBetaHeaders = "oauth-2025-04-20,interleaved-thinking-2025-05-14,fine-grained-tool-streaming-2025-05-14"
tokenExpiryBufferSeconds = 300

[settings.retry]
maxRetries = 3
baseDelayMs = 1000
maxDelayMs = 60000
jitterFactor = 0.2

[settings.context.compactor]
maxTokens = 25000
compactionThreshold = 0.85
targetTokens = 10000
charsPerToken = 4
bufferTokens = 4000
triggerTokenThreshold = 0.7
preserveRecentCount = 5

[settings.agent]
maxTurns = 250

[settings.logging.moduleOverrides]
ort = "error"

[settings.observability]
logLevel = "info"
payloadCapture = "normal"
verboseRetentionDays = 7
maxInlinePayloadBytes = 8192

[settings.storage]
retentionEnabled = true
maxDatabaseMb = 512

[settings.server]
heartbeatIntervalMs = 30000
defaultModel = "claude-sonnet-4-6"
defaultProvider = "anthropic"

[settings.tmux]
commandTimeoutMs = 30000
pollingIntervalMs = 500

[settings.session]
queueDrainMode = "sequential"

[settings.ui]
theme = "forest_green"

[settings.ui.palette]
primary = "#123524"
primaryLight = "#1a4a32"
primaryBright = "#2d7a4e"
primaryVivid = "#34d399"
emerald = "#10b981"
mint = "#6ee7b7"
sage = "#86efac"
dark = "#0a1f15"
muted = "#1f3d2c"
subtle = "#2d5a40"
textBright = "#ecfdf5"
textPrimary = "#d1fae5"
textSecondary = "#a7f3d0"
textMuted = "#6b8f7a"
textDim = "#4a6b58"
statusBarText = "#2eb888"
success = "#22c55e"
warning = "#f59e0b"
error = "#ef4444"
info = "#38bdf8"

[settings.ui.icons]
prompt = "\u203a"
user = "\u203a"
assistant = "\u25c6"
system = "\u25c7"
capabilityRunning = "\u25c7"
capabilitySuccess = "\u25c6"
capabilityError = "\u25c8"
ready = "\u25c6"
thinking = "\u25c7"
streaming = "\u25c6"
bullet = "\u2022"
arrow = "\u2192"
check = "\u2713"
pasteOpen = "\u2308"
pasteClose = "\u230b"

[settings.ui.thinkingAnimation]
chars = ["\u2581", "\u2582", "\u2583", "\u2584", "\u2585"]
width = 4
intervalMs = 120

[settings.ui.input]
pasteThreshold = 3
maxHistory = 100
defaultTerminalWidth = 80
narrowThreshold = 50
narrowVisibleLines = 10
normalVisibleLines = 20

[settings.ui.menu]
maxVisibleCommands = 5

# Provider credential registry/store paths. Raw secrets are never inlined here.
[auth]
registry = "auth.toml"
rawStore = "auth.json"
