# Tron managed default profile, schema v3.
# Profiles are runtime control-plane data. Live capabilities, plugins, recipes,
# health, bindings, and vector state belong to the capability registry/ledger.
# See packages/agent/docs/profile-control-plane.md for schema guidance.

version = "3"
name = "default"
managed = true
profileClass = "base"
inherits = []
authProfile = "default"

# Managed server/iOS/RPC settings baseline.
[settings]
version = "0.1.0"
name = "tron"

[settings.api.anthropic]
authUrl = "https://claude.ai/oauth/authorize"
tokenUrl = "https://console.anthropic.com/v1/oauth/token"
redirectUri = "https://console.anthropic.com/oauth/code/callback"
clientId = "9d1c250a-e61b-44d9-88ed-5944d1962f5e"
scopes = ["org:create_api_key", "user:profile", "user:inference"]
systemPromptPrefix = "You are Claude Code, Anthropic's official CLI for Claude."
oauthBetaHeaders = "oauth-2025-04-20,interleaved-thinking-2025-05-14,fine-grained-tool-streaming-2025-05-14"
tokenExpiryBufferSeconds = 300

[settings.retry]
maxRetries = 3
baseDelayMs = 1000
maxDelayMs = 60000
jitterFactor = 0.2

[settings.capabilities.process]
defaultTimeoutMs = 120000
maxTimeoutMs = 600000
maxOutputLength = 40000
dangerousPatterns = ["^rm\\s+(-rf?|--force)\\s+/\\s*$", "rm\\s+-rf?\\s+/", "^sudo\\s+", "^chmod\\s+777\\s+/\\s*$", "^mkfs\\.", "^dd\\s+if=.*of=/dev/", ">\\s*/dev/sd[a-z]"]

[settings.capabilities.process.sandbox]
defaultImage = "ubuntu:latest"
networkEnabled = true

[settings.capabilities.filesystemRead]
defaultLimitLines = 2000
maxLineLength = 2000
maxOutputTokens = 20000

[settings.capabilities.find]
defaultMaxResults = 100
defaultMaxDepth = 10

[settings.capabilities.search]
defaultMaxResults = 100
maxFileSizeBytes = 10485760
binaryExtensions = ["png", "jpg", "jpeg", "gif", "bmp", "ico", "webp", "svg", "mp3", "mp4", "wav", "avi", "mov", "mkv", "flac", "pdf", "doc", "docx", "xls", "xlsx", "ppt", "pptx", "zip", "tar", "gz", "bz2", "7z", "rar", "exe", "dll", "so", "dylib", "o", "a", "woff", "woff2", "ttf", "eot", "otf", "db", "sqlite", "bin"]
skipDirectories = ["node_modules", "__pycache__", "dist", "build", ".git", ".svn", ".hg", "vendor", "target"]
maxOutputTokens = 15000
astDefaultLimit = 50
astMaxLimit = 200
defaultContext = 0
astBinaryPath = "sg"
requireConfirmationForReplace = false
defaultTimeoutMs = 60000

[settings.capabilities.web.fetch]
timeoutMs = 30000

[settings.capabilities.web.cache]
ttlMs = 900000
maxEntries = 100

[settings.capabilities.browser]
headed = false

[settings.capabilities.computerUse]
confirmBeforeAction = true
screenshotThrottleMs = 500

[settings.context.compactor]
maxTokens = 25000
compactionThreshold = 0.85
targetTokens = 10000
charsPerToken = 4
bufferTokens = 4000
triggerTokenThreshold = 0.7
preserveRecentCount = 5

[settings.context.rules]
discoverStandaloneFiles = true

[settings.agent]
maxTurns = 250
subagentMaxDepth = 3
subagentModel = "claude-haiku-4-5-20251001"

[settings.agent.autonomy]
approvalPromptMode = "disabled"

[settings.logging.moduleOverrides]
ort = "error"

[settings.observability]
logLevel = "info"
payloadCapture = "normal"
verboseRetentionDays = 7
maxInlinePayloadBytes = 8192

[settings.storage]
retentionEnabled = true
maxDatabaseMb = 512

[settings.server]
heartbeatIntervalMs = 30000
memoryDbPath = "memory.db"
defaultModel = "claude-sonnet-4-6"
defaultProvider = "anthropic"

[settings.server.transcription]
enabled = false

[settings.server.update]
enabled = false
channel = "stable"
frequency = "daily"
action = "notify"

[settings.tmux]
commandTimeoutMs = 30000
pollingIntervalMs = 500

[settings.session]
worktreeTimeoutMs = 30000
queueDrainMode = "sequential"

[settings.session.isolation]
mode = "always"
baseDir = ".worktrees"
branchPrefix = "session/"
autoCommitOnRelease = true
preserveBranches = true
deleteWorktreeOnRelease = true

[settings.ui]
theme = "forest_green"

[settings.ui.palette]
primary = "#123524"
primaryLight = "#1a4a32"
primaryBright = "#2d7a4e"
primaryVivid = "#34d399"
emerald = "#10b981"
mint = "#6ee7b7"
sage = "#86efac"
dark = "#0a1f15"
muted = "#1f3d2c"
subtle = "#2d5a40"
textBright = "#ecfdf5"
textPrimary = "#d1fae5"
textSecondary = "#a7f3d0"
textMuted = "#6b8f7a"
textDim = "#4a6b58"
statusBarText = "#2eb888"
success = "#22c55e"
warning = "#f59e0b"
error = "#ef4444"
info = "#38bdf8"

[settings.ui.icons]
prompt = "\u203a"
user = "\u203a"
assistant = "\u25c6"
system = "\u25c7"
capabilityRunning = "\u25c7"
capabilitySuccess = "\u25c6"
capabilityError = "\u25c8"
ready = "\u25c6"
thinking = "\u25c7"
streaming = "\u25c6"
bullet = "\u2022"
arrow = "\u2192"
check = "\u2713"
pasteOpen = "\u2308"
pasteClose = "\u230b"

[settings.ui.thinkingAnimation]
chars = ["\u2581", "\u2582", "\u2583", "\u2584", "\u2585"]
width = 4
intervalMs = 120

[settings.ui.input]
pasteThreshold = 3
maxHistory = 100
defaultTerminalWidth = 80
narrowThreshold = 50
narrowVisibleLines = 10
normalVisibleLines = 20

[settings.ui.menu]
maxVisibleCommands = 5

[settings.memory]
autoRetainInterval = 10
retainModel = "claude-sonnet-4-6"

[settings.git]
protectedBranches = ["main", "master", "develop"]
sessionBranchPolicy = "keep"
mergeStrategy = "merge"
autoSetUpstream = true
crashRecoveryAbortTimeoutMs = 1800000
opTimeoutNetworkMs = 60000
opTimeoutLocalMs = 30000
subagentConflictResolutionEnabled = true

# Provider credential registry/store paths. Raw secrets are never inlined here.
[auth]
registry = "auth.toml"
rawStore = "auth.json"

# Entrypoints select prompt, model/context, primitive, execution, and audit policy ids.
[entrypoints.main]
prompt = "prompts/core.md"
modelPolicy = "sessionDefault"
contextPolicy = "cloudDefault"
localContextPolicy = "localDefault"
primitiveSurfacePolicy = "default"
capabilityExecutionPolicy = "default"
permissionPolicy = "main"
providerPolicy = "default"
cachePolicy = "default"
auditPolicy = "default"

[entrypoints.chat]
prompt = "prompts/chat.md"
modelPolicy = "sessionDefault"
contextPolicy = "cloudDefault"
localContextPolicy = "localDefault"
primitiveSurfacePolicy = "default"
capabilityExecutionPolicy = "default"
permissionPolicy = "main"
providerPolicy = "default"
cachePolicy = "default"
auditPolicy = "default"

[entrypoints.local]
prompt = "prompts/local.md"
modelPolicy = "sessionDefault"
contextPolicy = "localDefault"
primitiveSurfacePolicy = "localModel"
capabilityExecutionPolicy = "localModel"
permissionPolicy = "main"
providerPolicy = "default"
cachePolicy = "default"
auditPolicy = "default"

[entrypoints.gitWorkflow]
prompt = "prompts/git-workflow.md"
modelPolicy = "sessionDefault"
contextPolicy = "cloudDefault"
primitiveSurfacePolicy = "default"
capabilityExecutionPolicy = "default"
permissionPolicy = "main"
providerPolicy = "default"
cachePolicy = "default"
auditPolicy = "default"

# Harness-spawned child process contracts.
[processes.compaction]
kind = "summarizer"
prompt = "prompts/processes/compaction.md"
modelPolicy = "inheritParent"
contextPolicy = "minimalTransform"
primitiveSurfacePolicy = "none"
capabilityExecutionPolicy = "none"
permissionPolicy = "lockedDown"
outputContract = "compactionSummary"
auditPolicy = "default"
timeoutMs = 30000
blockingTimeoutMs = 30000
blocking = true
maxTurns = 1
maxDepth = 0
inheritCapabilities = false
reasoning = "medium"
audit = true

[processes.memoryRetain]
kind = "summarizer"
prompt = "prompts/processes/memory-retain.md"
modelPolicy = "settingsSubagent"
contextPolicy = "minimalTransform"
primitiveSurfacePolicy = "none"
capabilityExecutionPolicy = "none"
permissionPolicy = "lockedDown"
outputContract = "memoryRetention"
auditPolicy = "default"
timeoutMs = 30000
blockingTimeoutMs = 30000
blocking = true
maxTurns = 1
maxDepth = 0
inheritCapabilities = false
reasoning = "medium"
audit = true

[processes.webSummarizer]
kind = "capabilityWorker"
prompt = "prompts/processes/web-fetch-summarizer.md"
modelPolicy = "settingsSubagent"
contextPolicy = "minimalTransform"
primitiveSurfacePolicy = "none"
capabilityExecutionPolicy = "none"
permissionPolicy = "lockedDown"
outputContract = "capabilityAnswer"
auditPolicy = "default"
timeoutMs = 30000
blockingTimeoutMs = 30000
blocking = true
maxTurns = 1
maxDepth = 0
inheritCapabilities = false
workingDirectory = "/tmp"
audit = true

[processes.conflictResolver]
kind = "subagent"
prompt = "prompts/processes/conflict-resolver.md"
modelPolicy = "settingsSubagent"
contextPolicy = "cloudDefault"
primitiveSurfacePolicy = "conflictResolver"
capabilityExecutionPolicy = "conflictResolver"
permissionPolicy = "restrictedChild"
outputContract = "plainText"
auditPolicy = "default"
timeoutMs = 900000
blocking = false
maxTurns = 40
maxDepth = 0
inheritCapabilities = true
audit = true

[processes."spawnSubagent.inProcess"]
kind = "subagent"
prompt = "prompts/core.md"
modelPolicy = "inheritParent"
contextPolicy = "cloudDefault"
primitiveSurfacePolicy = "subagentInherited"
capabilityExecutionPolicy = "subagentInherited"
permissionPolicy = "child"
outputContract = "plainText"
auditPolicy = "default"
timeoutMs = 300000
blockingTimeoutMs = 300000
blocking = true
maxTurns = 50
inheritCapabilities = true
resultInjection = "nextParentTurn"
audit = true

[processes."spawnSubagent.tmux"]
kind = "subagent"
prompt = "prompts/core.md"
modelPolicy = "inheritParent"
contextPolicy = "cloudDefault"
primitiveSurfacePolicy = "subagentInherited"
capabilityExecutionPolicy = "subagentInherited"
permissionPolicy = "child"
outputContract = "plainText"
auditPolicy = "default"
timeoutMs = 0
blocking = false
maxTurns = 100
inheritCapabilities = true
resultInjection = "nextParentTurn"
audit = true

[processes."hooks.titleGen"]
kind = "hook"
modelPolicy = "settingsSubagent"
contextPolicy = "minimalTransform"
primitiveSurfacePolicy = "none"
capabilityExecutionPolicy = "none"
permissionPolicy = "lockedDown"
outputContract = "plainText"
auditPolicy = "default"
timeoutMs = 5000
blockingTimeoutMs = 5000
blocking = true
maxTurns = 1
maxDepth = 0
inheritCapabilities = false
audit = true

[processes."hooks.branchName"]
kind = "hook"
modelPolicy = "settingsSubagent"
contextPolicy = "minimalTransform"
primitiveSurfacePolicy = "none"
capabilityExecutionPolicy = "none"
permissionPolicy = "lockedDown"
outputContract = "plainText"
auditPolicy = "default"
timeoutMs = 5000
blockingTimeoutMs = 5000
blocking = true
maxTurns = 1
maxDepth = 0
inheritCapabilities = false
audit = true

[processes."hooks.suggestPrompts"]
kind = "hook"
modelPolicy = "settingsSubagent"
contextPolicy = "minimalTransform"
primitiveSurfacePolicy = "none"
capabilityExecutionPolicy = "none"
permissionPolicy = "lockedDown"
outputContract = "plainTextList"
auditPolicy = "default"
timeoutMs = 5000
blockingTimeoutMs = 5000
blocking = true
maxTurns = 1
maxDepth = 0
inheritCapabilities = false
audit = true

[processes.automationRun]
kind = "automation"
modelPolicy = "sessionDefault"
contextPolicy = "cloudDefault"
primitiveSurfacePolicy = "unattended"
capabilityExecutionPolicy = "unattended"
permissionPolicy = "child"
outputContract = "plainText"
auditPolicy = "default"
blocking = false
inheritCapabilities = true
resultInjection = "automationLedger"
audit = true

# Model/provider selection policies.
[modelPolicies.sessionDefault]
selection = "sessionDefault"
providerClass = "any"

[modelPolicies.inheritParent]
selection = "inheritParent"
providerClass = "any"

[modelPolicies.settingsSubagent]
selection = "settingsSubagent"
providerClass = "any"

# Context block and local-provider policies.
[contextPolicies.cloudDefault]
blocks = "context/context-blocks.toml"
primitiveSurfacePolicy = "default"
capabilityExecutionPolicy = "default"

[contextPolicies.localDefault]
blocks = "context/context-blocks.toml"
localProviders = ["ollama"]
primitiveSurfacePolicy = "localModel"
capabilityExecutionPolicy = "localModel"
stripMemory = true
stripSkillIndex = true
stripJobResults = true
skipPendingJobsBootstrap = true
rulesTruncationChars = 500
rulesTruncationSuffix = "\n\n[Truncated - full rules are available through execute]"

[contextPolicies.minimalTransform]
primitiveSurfacePolicy = "none"
capabilityExecutionPolicy = "none"
stripMemory = true
stripSkillIndex = true
stripJobResults = true
skipPendingJobsBootstrap = true

# Primitive surface policies control only the provider-facing primitives.
[primitiveSurfacePolicies.default]
allowedPrimitives = ["execute"]
exposeInteractiveCapabilities = true
removeSpawnAtMaxDepth = true

[primitiveSurfacePolicies.localModel]
allowedPrimitives = ["execute"]
exposeInteractiveCapabilities = true
removeSpawnAtMaxDepth = true

[primitiveSurfacePolicies.none]
allowedPrimitives = []
exposeInteractiveCapabilities = false
removeSpawnAtMaxDepth = true

[primitiveSurfacePolicies.subagentInherited]
allowedPrimitives = ["execute"]
exposeInteractiveCapabilities = false
removeSpawnAtMaxDepth = true

[primitiveSurfacePolicies.unattended]
allowedPrimitives = ["execute"]
exposeInteractiveCapabilities = false
removeSpawnAtMaxDepth = true

[primitiveSurfacePolicies.conflictResolver]
allowedPrimitives = ["execute"]
exposeInteractiveCapabilities = false
removeSpawnAtMaxDepth = true

# Capability execution policies control real worker capabilities.
[capabilityExecutionPolicies.default]
searchPolicy = "hybridLocal"
contextPrimerPolicy = "coreFirstParty"

[capabilityExecutionPolicies.localModel]
searchPolicy = "hybridLocal"
contextPrimerPolicy = "coreFirstParty"

[capabilityExecutionPolicies.none]
searchPolicy = "hybridLocal"
contextPrimerPolicy = "disabled"
allowedContracts = []

[capabilityExecutionPolicies.subagentInherited]
searchPolicy = "hybridLocal"
contextPrimerPolicy = "coreFirstParty"

[capabilityExecutionPolicies.unattended]
searchPolicy = "hybridLocal"
contextPrimerPolicy = "coreFirstParty"

[capabilityExecutionPolicies.conflictResolver]
searchPolicy = "hybridLocal"
contextPrimerPolicy = "coreFirstParty"
allowedContracts = ["filesystem::read_file", "filesystem::edit_file", "filesystem::write_file", "process::run"]

[capabilitySearchPolicies.hybridLocal]
lexical = true
localVector = true
cloudEmbeddings = false
maxResults = 50
requireLocalVector = false
allowLexicalOnlyWhenDegraded = true

[capabilityContextPrimerPolicies.coreFirstParty]
enabled = true
mode = "coreFirstParty"
maxTokens = 2600
includeExamples = true
includeCompactSchemas = true

[capabilityContextPrimerPolicies.allVisibleCompact]
enabled = true
mode = "allVisibleCompact"
maxTokens = 2400
includeExamples = false
includeCompactSchemas = true

[capabilityContextPrimerPolicies.disabled]
enabled = false
mode = "coreFirstParty"
maxTokens = 0
includeExamples = false
includeCompactSchemas = false

# Permission policies describe privilege inheritance. Child processes should not
# gain filesystem, model, or auth authority beyond their parent/profile unless a
# future policy explicitly opts into that escalation.
[permissionPolicies.main]
inheritCapabilities = true

[permissionPolicies.child]
inheritCapabilities = true
allowFilesystemEscalation = false
allowModelEscalation = false
allowAuthEscalation = false

[permissionPolicies.restrictedChild]
inheritCapabilities = true
allowFilesystemEscalation = false
allowModelEscalation = false
allowAuthEscalation = false

[permissionPolicies.lockedDown]
inheritCapabilities = false
allowFilesystemEscalation = false
allowModelEscalation = false
allowAuthEscalation = false

# Provider policies adapt the resolved context/prompt to provider-specific API
# surfaces without changing semantic content.
#
# - systemPromptSurface = "providerDefault" lets the provider payload use the provider's
#   normal system/developer/instruction slot.
# - systemPromptSurface = "capabilityClarification" adds provider-specific guidance
#   for providers that need extra capability-invocation instruction text.
# - allowDuplicateSystemPrompt must normally remain false; true is only for a
#   provider payload implementation that intentionally needs duplicate system text.
[providerPolicies.default]
systemPromptSurface = "providerDefault"
cachePolicy = "default"
allowDuplicateSystemPrompt = false

[providerPolicies.openaiCodex]
prompt = "providers/openai/codex-instructions.md"
systemPromptSurface = "capabilityClarification"
capabilityClarification = true
cachePolicy = "default"
allowDuplicateSystemPrompt = false

# Cache policies are provider-independent intent. Provider payload builders map these
# values onto each provider's current capabilities. If a provider lacks an
# equivalent cache feature, the payload content stays the same and only caching
# becomes best-effort/uncached.
[cachePolicies.default]
foundation = "cacheIfSupported"
profile = "cacheIfSupported"
session = "cacheIfSupported"
turn = "noCache"
none = "noCache"

# Output contracts name the result shape expected from a process. `required`
# means invalid/missing output is treated as a process failure.
[outputContracts.plainText]
kind = "plainText"
required = true

[outputContracts.plainTextList]
kind = "plainTextList"
required = true

[outputContracts.compactionSummary]
kind = "compactionSummary"
required = true

[outputContracts.memoryRetention]
kind = "memoryRetention"
required = true

[outputContracts.capabilityAnswer]
kind = "capabilityAnswer"
required = true

# Audit policy controls what is retained for replay/self-inspection. Redaction
# is still enforced by the audit repositories and provider/auth layers; this
# policy decides which kinds of refs/hashes/payload previews are recorded.
[auditPolicy.default]
enabled = true
recordProviderPayload = true
recordContextBlocks = true
