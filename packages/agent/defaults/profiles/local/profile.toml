# Local-provider Tron profile.
#
# Local sessions optimize for smaller local model context windows while still
# preserving enough orientation to be useful. The profile inherits the complete
# default spec, then maps the main entrypoint to the local prompt, local context
# policy, and local runtime policies. Future local variants should inherit from this
# profile rather than from "default" directly.

version = "3"
name = "local"
managed = true
profileClass = "local"
inherits = ["default"]
authProfile = "default"

[entrypoints.main]
prompt = "prompts/local.md"
contextPolicy = "localDefault"
localContextPolicy = "localDefault"
primitiveSurfacePolicy = "localModel"
capabilityExecutionPolicy = "localModel"
