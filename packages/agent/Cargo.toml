[package]
name = "tron"
description = "Tron AI agent — server, tools, runtime, and LLM orchestration"
version = "0.1.0"
edition = "2024"
rust-version = "1.91"
license = "MIT"
repository = "https://github.com/moose/tron"

[features]
default = ["ort", "apns"]
ort = ["dep:ort", "dep:tokenizers", "dep:hf-hub", "dep:ndarray"]
apns = ["dep:jsonwebtoken"]
browser-integration = []

[lib]
doctest = false

[[bin]]
name = "tron"
path = "src/main.rs"

[dependencies]
# Async runtime
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "net", "io-util", "process", "signal", "fs", "parking_lot"] }
tokio-util = { version = "0.7", features = ["codec", "io"] }
tokio-stream = "0.1"
async-trait = "0.1"
async-stream = "0.3"
futures = "0.3"
pin-project-lite = "0.2"

# HTTP / WebSocket
axum = { version = "0.8", features = ["ws"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace", "limit", "timeout", "request-id", "catch-panic", "compression-gzip"] }
tokio-tungstenite = "0.26"
reqwest = { version = "0.12", features = ["json", "stream", "rustls-tls", "http2"], default-features = false }
eventsource-stream = "0.2"

# Database
rusqlite = { version = "0.32", features = ["bundled", "serde_json", "functions"] }
r2d2 = "0.8"
r2d2_sqlite = "0.25"

# Serialization
serde = { version = "1", features = ["derive", "rc"] }
serde_json = "1"

# Logging / Tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Metrics
metrics = "0.24"
metrics-exporter-prometheus = { version = "0.16", default-features = false }

# Error handling
thiserror = "2"
anyhow = "1"

# IDs and time
uuid = { version = "1", features = ["v7", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
chrono-tz = "0.10"

# CLI
clap = { version = "4", features = ["derive"] }

# Crypto
sha2 = "0.10"
base64 = "0.22"
rand = "0.9"
percent-encoding = "2"

# Filesystem
globset = "0.4"
walkdir = "2"
regex = "1"
rustix = { version = "1.1", features = ["fs"] }

# HTML
scraper = "0.22"
html2text = "0.14"

# Concurrency
parking_lot = "0.12"
dashmap = "6"

# Zero-copy
bytemuck = { version = "1", features = ["derive"] }

# Allocator
mimalloc = { version = "0.1", default-features = false }

# Misc
bytes = "1"
indexmap = "2"
url = "2"
urlencoding = "2"

# Embeddings (optional)
ort = { version = "2.0.0-rc.11", optional = true }
tokenizers = { version = "0.21", default-features = false, features = ["onig"], optional = true }
hf-hub = { version = "0.4", default-features = false, features = ["ureq", "rustls-tls"], optional = true }
ndarray = { version = "0.16", optional = true }

# APNS (optional)
jsonwebtoken = { version = "9", optional = true }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile = "3"
wiremock = "0.6"
insta = { version = "1", features = ["json", "redactions"] }
proptest = "1"
mockall = "0.13"
assert_matches = "1"
tokio = { version = "1", features = ["test-util"] }
tokio-tungstenite = "0.26"
async-stream = "0.3"
reqwest = { version = "0.12", features = ["json", "stream", "rustls-tls", "http2"], default-features = false }
futures = "0.3"

[lints.rust]
unsafe_code = "deny"
unused_results = "warn"
missing_docs = "warn"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
cast_possible_truncation = "allow"
cast_possible_wrap = "allow"
cast_sign_loss = "allow"
cast_precision_loss = "allow"
too_many_lines = "allow"
too_many_arguments = "allow"
struct_excessive_bools = "allow"
type_complexity = "allow"
used_underscore_binding = "allow"

[profile.release]
lto = "fat"
opt-level = 3
strip = true
codegen-units = 1
