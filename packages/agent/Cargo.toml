[package]
name = "tron"
description = "Tron AI agent — server, tools, runtime, and LLM orchestration"
version = "0.1.0-beta.7"
edition = "2024"
rust-version = "1.91"
license = "MIT"
repository = "https://github.com/mhismail3/tron"

[features]
default = ["apns"]
apns = []


[lib]
doctest = false

[[bin]]
name = "tron"
path = "src/main.rs"

[dependencies]
# Async runtime
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "net", "io-util", "process", "signal", "fs", "parking_lot"] }
tokio-util = { version = "0.7", features = ["codec", "io"] }
tokio-stream = "0.1"
async-trait = "0.1"
async-stream = "0.3"
futures = "0.3"
pin-project-lite = "0.2"

# HTTP / WebSocket
axum = { version = "0.8", features = ["ws"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace", "limit", "timeout", "request-id", "catch-panic", "compression-gzip"] }
tokio-tungstenite = "0.26"
reqwest = { version = "0.12", features = ["json", "stream", "rustls-tls", "http2"], default-features = false }
eventsource-stream = "0.2"

# Database
rusqlite = { version = "0.32", features = ["bundled", "serde_json", "functions"] }
r2d2 = "0.8"
r2d2_sqlite = "0.25"
zstd = "0.13"
# Pin the latest stable sqlite-vec crate; the newer alpha package is currently
# missing a bundled C include on macOS.
sqlite-vec = "=0.1.9"

# Local embeddings / capability search
fastembed = { version = "5.13.4", default-features = false, features = ["ort-download-binaries-rustls-tls"] }

# Sandboxed program execution
rquickjs = "0.11.0"
rquickjs-serde = "0.5.0"

# Serialization
serde = { version = "1", features = ["derive", "rc"] }
serde_json = "1"
toml = "0.8"

# Logging / Tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Metrics
metrics = "0.24"
metrics-exporter-prometheus = { version = "0.16", default-features = false }

# Error handling
thiserror = "2"
anyhow = "1"

# IDs and time
uuid = { version = "1", features = ["v7", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
chrono-tz = "0.10"

# CLI
clap = { version = "4", features = ["derive"] }

# Crypto
sha2 = "0.10"
hmac = "0.12"
hex = "0.4"
base64 = "0.22"
ed25519-dalek = "2"
rand = "0.9"
percent-encoding = "2"

# Filesystem
globset = "0.4"
walkdir = "2"
regex = "1"
rustix = { version = "1.1", features = ["fs"] }
tempfile = "3"

# HTML
scraper = "0.22"
html2text = "0.14"

# Image conversion (Display tool: SVG/BMP/TIFF → PNG for iOS)
image = { version = "0.25", default-features = false, features = ["png", "bmp", "tiff"] }
resvg = "0.44"

# Concurrency
parking_lot = "0.12"
dashmap = "6"
# ArcSwap: lock-free atomic Arc swap for the global settings singleton.
# Reads resolve in a handful of ns with no blocking; writers swap in O(1).
arc-swap = "1"

# Zero-copy
bytemuck = { version = "1", features = ["derive"] }

# Allocator
mimalloc = { version = "0.1", default-features = false }

# PTY support
portable-pty = "0.8"

# Misc
bytes = "1"
indexmap = "2"
url = "2"
urlencoding = "2"
unicode-normalization = "0.1"
home = "0.5"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(target_os = "macos")'.dependencies]
enigo = { version = "0.6.1", default-features = false }

[dev-dependencies]
wiremock = "0.6"
insta = { version = "1", features = ["json", "redactions"] }
proptest = "1"
mockall = "0.13"
assert_matches = "1"
tokio = { version = "1", features = ["test-util"] }
tokio-tungstenite = "0.26"
async-stream = "0.3"
reqwest = { version = "0.12", features = ["json", "stream", "rustls-tls", "http2"], default-features = false }
futures = "0.3"

[lints.rust]
unsafe_code = "deny"
unused_imports = "deny"
unused_must_use = "deny"
unused_results = "allow"
unused_variables = "deny"
unreachable_code = "deny"
missing_docs = "warn"

[lints.clippy]
all = { level = "allow", priority = -2 }
pedantic = { level = "allow", priority = -2 }
correctness = { level = "deny", priority = -1 }
suspicious = { level = "deny", priority = -1 }
perf = { level = "deny", priority = -1 }
duplicated_attributes = "deny"
let_underscore_future = "deny"
await_holding_lock = "allow"
large_stack_arrays = "allow"
struct_excessive_bools = "allow"
type_complexity = "allow"
used_underscore_binding = "allow"

[profile.release]
lto = "fat"
opt-level = 3
strip = true
codegen-units = 1

[profile.dev-server]
inherits = "release"
lto = "thin"
codegen-units = 16
strip = false
