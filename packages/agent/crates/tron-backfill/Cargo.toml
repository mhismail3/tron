[package]
name = "tron-backfill"
description = "Standalone tool to import LEDGER.jsonl and embed memory entries"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[lints]
workspace = true

[features]
default = ["embeddings"]
embeddings = ["tron-embeddings/ort"]

[[bin]]
name = "tron-backfill"
path = "src/main.rs"

[dependencies]
tron-events.workspace = true
tron-embeddings.workspace = true
tron-settings.workspace = true
clap.workspace = true
anyhow.workspace = true
serde.workspace = true
serde_json.workspace = true
rusqlite.workspace = true
tokio.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
parking_lot.workspace = true
uuid.workspace = true
chrono.workspace = true

[dev-dependencies]
tempfile.workspace = true
