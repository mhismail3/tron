name = "tron-push-relay"
main = "src/index.ts"
compatibility_date = "2024-09-23"

[vars]
APNS_BUNDLE_ID = "com.tron.mobile"

# Secrets (set via `wrangler secret put <NAME>`):
# - APNS_KEY_P8       : Contents of the .p8 private key file
# - APNS_KEY_ID       : 10-char Apple key ID
# - APNS_TEAM_ID      : 10-char Apple team ID
# - TRON_RELAY_SECRET  : Shared HMAC secret for request authentication
