name: TronMac
options:
  bundleIdPrefix: com.tron
  deploymentTarget:
    macOS: "15.0"
  developmentLanguage: en
  generateEmptyDirectories: true
  createIntermediateGroups: true

configFiles:
  Debug: Configuration/Debug.xcconfig
  Release: Configuration/Release.xcconfig

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: false
    DEVELOPMENT_TEAM: MYGKXH6TY4
    CODE_SIGN_STYLE: Automatic
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES

targets:
  TronMac:
    type: application
    platform: macOS
    sources:
      - path: Sources
        createIntermediateGroups: true
        excludes:
          - "Resources/**"
      # Resources get added as individual file references (not a folder
      # reference), so each file lands at the top level of
      # `Tron.app/Contents/Resources/` — required by the wizard's
      # `Bundle.main.url(forResource: "tron-agent")` lookup in
      # Sources/Wizard/Steps/InstallStep.swift:137.
      - path: Sources/Resources
        createIntermediateGroups: true
        buildPhase: resources
        optional: true
        excludes:
          - "Library/**"
    settings:
      base:
        INFOPLIST_FILE: Sources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: TronMac.entitlements
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "2"
        TRON_CANONICAL_VERSION: "0.1.0-beta.2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_HARDENED_RUNTIME: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.tron.mac.dev
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.tron.mac
    postBuildScripts:
      - name: Copy Bundled Login Item
        script: |
          set -euo pipefail
          SRC="$SRCROOT/Sources/Resources/Library"
          DST="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Library"
          test -d "$SRC" || { echo "Missing bundled Library resources at $SRC" >&2; exit 1; }
          rm -rf "$DST"
          mkdir -p "$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH"
          ditto "$SRC" "$DST"
          TRANSCRIPTION_SRC="$SRCROOT/../agent/src/transcription/sidecar"
          TRANSCRIPTION_DST="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Resources/Transcription"
          test -f "$TRANSCRIPTION_SRC/worker.py" || { echo "Missing transcription worker at $TRANSCRIPTION_SRC/worker.py" >&2; exit 1; }
          test -f "$TRANSCRIPTION_SRC/requirements.txt" || { echo "Missing transcription requirements at $TRANSCRIPTION_SRC/requirements.txt" >&2; exit 1; }
          rm -rf "$TRANSCRIPTION_DST"
          mkdir -p "$TRANSCRIPTION_DST"
          ditto "$TRANSCRIPTION_SRC" "$TRANSCRIPTION_DST"
          SKILLS_SRC="$SRCROOT/../agent/skills"
          SKILLS_DST="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Resources/Skills"
          test -d "$SKILLS_SRC" || { echo "Missing managed skills at $SKILLS_SRC" >&2; exit 1; }
          find "$SKILLS_SRC" -mindepth 2 -maxdepth 2 -name .managed -print -quit | grep -q . \
            || { echo "No managed skills found under $SKILLS_SRC" >&2; exit 1; }
          rm -rf "$SKILLS_DST"
          mkdir -p "$SKILLS_DST"
          ditto "$SKILLS_SRC" "$SKILLS_DST"
          find "$SKILLS_DST" -name node_modules -type d -prune -exec rm -rf {} +
          find "$SKILLS_DST" -name .DS_Store -type f -delete
          HELPER="$DST/LoginItems/Tron Server.app"
          if [ -d "$HELPER" ] && [ "${CODE_SIGNING_ALLOWED:-YES}" != "NO" ]; then
            SIGN_IDENTITY="${EXPANDED_CODE_SIGN_IDENTITY:-${CODE_SIGN_IDENTITY:--}}"
            codesign --force --sign "$SIGN_IDENTITY" --options runtime --timestamp=none "$HELPER"
          fi

  TronMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        createIntermediateGroups: true
        optional: true
    dependencies:
      - target: TronMac
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TronMac.app/Contents/MacOS/TronMac"
        GENERATE_INFOPLIST_FILE: YES
        TEST_RUNNER_WAIT_FOR_DEBUGGER: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.tron.mac.tests
        CODE_SIGN_IDENTITY: "-"

schemes:
  TronMac:
    build:
      targets:
        TronMac: all
        TronMacTests: [test]
    run:
      config: Debug
      environmentVariables:
        TRON_PROJECT_ROOT: "$(SRCROOT)/../.."
    test:
      config: Debug
      environmentVariables:
        TRON_MAC_TEST_HOST: "1"
      targets:
        - TronMacTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  TronMac Isolated Install:
    build:
      targets:
        TronMac: all
        TronMacTests: [test]
    run:
      config: Debug
      environmentVariables:
        TRON_PROJECT_ROOT: "$(SRCROOT)/../.."
        TRON_MAC_INSTALL_MODE: isolated
        TRON_HOME_NAME: ".tron-dev"
    test:
      config: Debug
      environmentVariables:
        TRON_MAC_TEST_HOST: "1"
      targets:
        - TronMacTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
