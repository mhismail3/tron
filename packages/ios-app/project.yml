name: TronMobile
options:
  bundleIdPrefix: com.tron
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "2640"
  developmentLanguage: en
  generateEmptyDirectories: true
  createIntermediateGroups: true

configFiles:
  Beta: Configuration/Beta.xcconfig
  ProdDebug: Configuration/ProdDebug.xcconfig
  Prod: Configuration/Prod.xcconfig

configs:
  Beta: debug
  ProdDebug: debug
  Prod: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: false
    DEVELOPMENT_TEAM: MYGKXH6TY4
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

targets:
  TronMobile:
    type: application
    platform: iOS
    sources:
      - path: Sources
        createIntermediateGroups: true
      - path: Sources/Resources/Fonts
        type: folder
        buildPhase: resources
    dependencies:
      - target: TronShareExtension
        embed:
          codeSign: true
          removeHeadersOnCopy: true
    settings:
      base:
        INFOPLIST_FILE: Sources/Info.plist
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "7"
        TRON_CANONICAL_VERSION: "0.1.0-beta.7"
        SWIFT_EMIT_LOC_STRINGS: YES
      configs:
        Beta:
          CODE_SIGN_ENTITLEMENTS: TronMobileBeta.entitlements
        ProdDebug:
          CODE_SIGN_ENTITLEMENTS: TronMobileProd.entitlements
        Prod:
          CODE_SIGN_ENTITLEMENTS: TronMobileProd.entitlements

  TronShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
      - path: Sources/Support/Share/SharedContent.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tron.mobile.ShareExtension
        INFOPLIST_FILE: ShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: MYGKXH6TY4
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "7"
        TRON_CANONICAL_VERSION: "0.1.0-beta.7"
      configs:
        Beta:
          PRODUCT_BUNDLE_IDENTIFIER: com.tron.mobile.beta.ShareExtension
        ProdDebug:
          PRODUCT_BUNDLE_IDENTIFIER: com.tron.mobile.ShareExtension
          CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtensionProd.entitlements
        Prod:
          PRODUCT_BUNDLE_IDENTIFIER: com.tron.mobile.ShareExtension
          CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtensionProd.entitlements

  TronMobileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
        createIntermediateGroups: true
        optional: true
    dependencies:
      - target: TronMobile
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TronMobile.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/TronMobile"
        GENERATE_INFOPLIST_FILE: YES
        TEST_RUNNER_WAIT_FOR_DEBUGGER: NO

  TronMobileUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
        createIntermediateGroups: true
        optional: true
    dependencies:
      - target: TronMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tron.mobile.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: TronMobile

schemes:
  Tron:
    build:
      targets:
        TronMobile: all
        TronShareExtension: all
        TronMobileTests: [test]
    run:
      config: Prod
      debugEnabled: false
    # Tests always run against the Beta (debug) config because
    # `ENABLE_TESTABILITY = YES` is only set there — `@testable import
    # TronMobile` fails against Prod (release), which disables testability.
    # This is the standard Apple pattern: release builds ship without
    # testability, tests run against a debug build of the same module.
    test:
      config: Beta
      targets:
        - TronMobileTests
    profile:
      config: Prod
    analyze:
      config: Prod
    archive:
      config: Prod

  Tron Beta:
    build:
      targets:
        TronMobile: all
        TronShareExtension: all
        TronMobileTests: [test]
    run:
      config: Beta
    test:
      config: Beta
      targets:
        - TronMobileTests
    profile:
      config: Beta
    analyze:
      config: Beta
    archive:
      config: Beta

  Tron UI Validation:
    build:
      targets:
        TronMobile: all
        TronShareExtension: all
        TronMobileUITests: [test]
    run:
      config: Beta
    test:
      config: Beta
      targets:
        - TronMobileUITests
    profile:
      config: Beta
    analyze:
      config: Beta
    archive:
      config: Beta

  Tron Fast:
    build:
      targets:
        TronMobile: all
        TronShareExtension: all
        TronMobileTests: [test]
    run:
      config: ProdDebug
    test:
      config: ProdDebug
      targets:
        - TronMobileTests
    profile:
      config: ProdDebug
    analyze:
      config: ProdDebug
    archive:
      config: Prod
