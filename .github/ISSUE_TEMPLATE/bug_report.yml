name: Bug report
description: Something is broken or behaving unexpectedly.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The more detail below, the
        faster this gets fixed.

        Before filing: please run `tron logs --tail 50` (Mac) or copy the recent
        log snippet from iOS Settings → Send Feedback. Paste the relevant lines
        in the "Logs" section below — most bugs are diagnosed straight from logs.

  - type: input
    id: tron-version
    attributes:
      label: Tron version
      description: |
        Server version: run `tron --version` on Mac, or check
        Settings → About in the iOS app.
      placeholder: "e.g. 0.1.0 (commit a1b2c3d)"
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Surface
      description: Which part of Tron is misbehaving?
      multiple: true
      options:
        - Rust agent (server)
        - iOS app
        - Mac app (Tron.app wrapper)
        - CLI (`tron …`)
        - Documentation
        - Other / not sure
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS version
      description: Run `sw_vers -productVersion`.
      placeholder: "e.g. 14.5"
    validations:
      required: false

  - type: input
    id: ios-version
    attributes:
      label: iOS version
      description: Settings → General → About → Software Version.
      placeholder: "e.g. 18.1"
    validations:
      required: false

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug. What did you do, what did you expect, what did you see instead?
      placeholder: |
        I tried to X. I expected Y. Instead, Z happened.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Concrete steps. If we can't reproduce it, we can't fix it.
      placeholder: |
        1. Open the iOS app
        2. Go to Settings → Providers
        3. Tap "Add API Key"
        4. …
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Server logs (last ~50 lines around the failure) help a lot.
        Get them via `tron logs --tail 50` on Mac.
        For iOS bugs, use Settings → Send Feedback (which attaches logs automatically).
      render: shell
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, related issues, suspected root cause, workarounds you've tried.
    validations:
      required: false

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues for this bug.
          required: true
        - label: The logs / screenshots above contain no secrets, API keys, or personal data.
          required: true
