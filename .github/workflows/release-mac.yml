# Mac DMG Release Pipeline (Plan §E, Phase 6)
#
# Builds a signed, notarized, stapled DMG for `Tron.app` and attaches it to
# a GitHub Release. Triggered by:
#   - Tag push matching `mac-v*` (e.g. `mac-v0.5.0`, `mac-v0.5.1-beta.1`)
#   - Manual `workflow_dispatch` with an explicit version (enables dry-run
#     without tagging).
#
# ─── Pipeline overview ──────────────────────────────────────────────────
#
#   1. Resolve the target version from the tag or the manual input.
#   2. Build the Rust agent binary in release mode (cached).
#   3. Stage the agent into `packages/mac-app/Sources/Resources/tron-agent`
#      via the existing `scripts/bundle-agent.sh` helper (same script the
#      local `tron dev` + archive commands use — zero drift).
#   4. Generate the Xcode project with XcodeGen and archive the
#      `TronMac` scheme with automatic signing.
#   5. Export the `.app` from the archive (Developer ID Application).
#   6. Notarize via `xcrun notarytool submit --wait`; staple with `stapler`.
#   7. Build the DMG via `create-dmg` into `dist/Tron-mac-vX.Y.Z.dmg`.
#   8. Generate a SHA256 manifest next to the DMG.
#   9. Attach the DMG + manifest to a GitHub Release (draft by default —
#      flipped live by a maintainer after verifying the assets).
#
# ─── Required secrets ───────────────────────────────────────────────────
#
#   MACOS_CERT_P12_BASE64   base64-encoded Developer ID Application cert
#   MACOS_CERT_PASSWORD     password protecting the .p12
#   NOTARIZE_APPLE_ID       Apple ID email for notarytool
#   NOTARIZE_TEAM_ID        Apple Developer team ID (MYGKXH6TY4)
#   NOTARIZE_APP_PASSWORD   app-specific password for the Apple ID
#
# All five must be present for notarization to run. In dry-run mode
# (workflow_dispatch with `dry_run=true`) missing secrets are tolerated
# and the job short-circuits before the notarization step.
#
# ─── Rollback ───────────────────────────────────────────────────────────
#
# Bad release? `gh release delete mac-vX.Y.Z` pulls the DMG. Existing
# installs are unaffected (they don't auto-pull deletions). Cut a fixed
# release at `mac-vX.Y.Z+1`.

name: Release (Mac DMG)

on:
  push:
    tags:
      - "mac-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 0.5.0-beta.1). Leave blank for tag-driven run."
        required: false
        type: string
      dry_run:
        description: "Skip notarization + release publish (true/false)."
        required: false
        default: "true"
        type: string

concurrency:
  group: release-mac-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # needed for gh release create

jobs:
  build-dmg:
    name: Build + sign + notarize DMG
    runs-on: macos-15
    timeout-minutes: 60

    env:
      # Lifted into the job env so every step sees them.
      APP_NAME: Tron
      APP_BUNDLE: Tron.app
      MAC_APP_DIR: packages/mac-app
      DMG_BASENAME: Tron-mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed so release notes can reference prior tags

      # ── Resolve version ────────────────────────────────────────────
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME:-}" == mac-v* ]]; then
            v="${GITHUB_REF_NAME#mac-v}"
            mode="tag"
          elif [[ -n "${{ inputs.version }}" ]]; then
            v="${{ inputs.version }}"
            mode="manual"
          else
            # Manual trigger without a version → read MARKETING_VERSION from
            # project.yml so a dry-run still produces consistent artifacts.
            v=$(awk -F'"' '/MARKETING_VERSION:/ { print $2; exit }' "$MAC_APP_DIR/project.yml")
            mode="project.yml"
          fi
          if [[ -z "$v" ]]; then echo "::error::could not resolve version"; exit 1; fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "mode=$mode"  >> "$GITHUB_OUTPUT"
          echo "tag=mac-v$v" >> "$GITHUB_OUTPUT"
          echo "dmg_name=${DMG_BASENAME}-v${v}.dmg" >> "$GITHUB_OUTPUT"
          echo "Resolved version=$v (from $mode)"

      - name: Resolve dry-run flag
        id: drymode
        shell: bash
        run: |
          # Tag pushes default to publish; workflow_dispatch defaults to dry-run.
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            flag="${{ inputs.dry_run }}"
            [[ -z "$flag" ]] && flag="true"
          else
            flag="false"
          fi
          # Also treat missing notarize secrets as an automatic dry-run so
          # forks can exercise the build without the Apple credentials.
          if [[ -z "${{ secrets.MACOS_CERT_P12_BASE64 }}" \
             || -z "${{ secrets.NOTARIZE_APPLE_ID }}" \
             || -z "${{ secrets.NOTARIZE_TEAM_ID }}" \
             || -z "${{ secrets.NOTARIZE_APP_PASSWORD }}" ]]; then
            flag="true"
            echo "::notice::Notarization secrets missing → forcing dry-run"
          fi
          echo "dry_run=$flag" >> "$GITHUB_OUTPUT"
          echo "Dry-run=$flag"

      # ── Rust toolchain ─────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: packages/agent

      - name: Build agent (release)
        working-directory: packages/agent
        run: cargo build --release --bin tron --locked

      # ── Xcode toolchain ────────────────────────────────────────────
      - name: Pin Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen + create-dmg
        run: |
          brew install xcodegen create-dmg

      - name: Stage agent binary into mac-app resources
        working-directory: packages/mac-app
        run: |
          # --skip-build because we already built the release binary above;
          # the script just copies + chmod + stages atomically.
          ./scripts/bundle-agent.sh --skip-build

      - name: Generate Xcode project
        working-directory: packages/mac-app
        run: xcodegen generate

      # ── Code signing setup ─────────────────────────────────────────
      - name: Import codesign cert
        if: steps.drymode.outputs.dry_run != 'true'
        env:
          CERT_B64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PW:  ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN=build.keychain
          KEYCHAIN_PW=$(openssl rand -hex 16)
          echo "$CERT_B64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security import /tmp/cert.p12 \
            -k "$KEYCHAIN" \
            -P "$CERT_PW" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          rm -f /tmp/cert.p12
          echo "KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          # Capture the signing identity so later steps can pass --sign <id>.
          security find-identity -v -p codesigning "$KEYCHAIN" | tee /tmp/identities.txt
          ident=$(grep "Developer ID Application" /tmp/identities.txt | head -1 | awk '{print $2}')
          if [[ -z "$ident" ]]; then echo "::error::no Developer ID Application identity found"; exit 1; fi
          echo "SIGN_IDENT=$ident" >> "$GITHUB_ENV"

      # ── Archive + export ───────────────────────────────────────────
      - name: xcodebuild archive
        working-directory: packages/mac-app
        run: |
          set -euo pipefail
          ARCHIVE_PATH=$(pwd)/build/TronMac.xcarchive
          xcodebuild archive \
            -project TronMac.xcodeproj \
            -scheme TronMac \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -destination 'generic/platform=macOS' \
            CODE_SIGN_STYLE=Manual \
            ${SIGN_IDENT:+CODE_SIGN_IDENTITY="$SIGN_IDENT"} \
            DEVELOPMENT_TEAM="${{ secrets.NOTARIZE_TEAM_ID }}" \
            -quiet
          echo "ARCHIVE_PATH=$ARCHIVE_PATH" >> "$GITHUB_ENV"

      - name: Locate exported .app
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$ARCHIVE_PATH/Products/Applications/$APP_BUNDLE"
          test -d "$APP_PATH" || { echo "::error::archive missing $APP_BUNDLE"; exit 1; }
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          ls -la "$APP_PATH/Contents/MacOS"
          test -f "$APP_PATH/Contents/Resources/tron-agent" \
            || { echo "::error::tron-agent missing from Resources/"; exit 1; }

      # Sign the embedded helper first (inside-out signing is required for
      # hardened runtime + notarization). Xcode already signed the outer
      # app bundle during archive, but the embedded binary ships unsigned
      # because it's staged as a plain resource — re-sign explicitly.
      - name: Sign embedded tron-agent helper
        if: steps.drymode.outputs.dry_run != 'true'
        run: |
          set -euo pipefail
          codesign --force --timestamp --options runtime \
            --sign "$SIGN_IDENT" \
            "$APP_PATH/Contents/Resources/tron-agent"
          codesign --verify --strict "$APP_PATH/Contents/Resources/tron-agent"

      - name: Re-sign Tron.app with hardened runtime
        if: steps.drymode.outputs.dry_run != 'true'
        run: |
          set -euo pipefail
          codesign --force --timestamp --options runtime \
            --deep \
            --sign "$SIGN_IDENT" \
            --entitlements "$MAC_APP_DIR/TronMac.entitlements" \
            "$APP_PATH"
          codesign --verify --strict --deep --verbose=2 "$APP_PATH"

      # ── Notarize + staple ─────────────────────────────────────────
      - name: Notarize
        if: steps.drymode.outputs.dry_run != 'true'
        env:
          APPLE_ID:     ${{ secrets.NOTARIZE_APPLE_ID }}
          TEAM_ID:      ${{ secrets.NOTARIZE_TEAM_ID }}
          APP_PASSWORD: ${{ secrets.NOTARIZE_APP_PASSWORD }}
        run: |
          set -euo pipefail
          ZIP_PATH=/tmp/TronApp-notarize.zip
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"
          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id  "$TEAM_ID" \
            --password "$APP_PASSWORD" \
            --wait
          rm -f "$ZIP_PATH"

      - name: Staple
        if: steps.drymode.outputs.dry_run != 'true'
        run: xcrun stapler staple "$APP_PATH"

      # ── DMG assembly ──────────────────────────────────────────────
      - name: Build DMG
        id: dmg
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          DMG_PATH="$(pwd)/dist/${{ steps.ver.outputs.dmg_name }}"
          # `--skip-jenkins` keeps create-dmg from trying to open a GUI
          # window on the headless runner. `--hdiutil-quiet` suppresses
          # the verbose Apple tooling output that otherwise spams logs.
          create-dmg \
            --volname "${APP_NAME} ${{ steps.ver.outputs.version }}" \
            --window-size 540 340 \
            --icon "$APP_BUNDLE" 135 170 \
            --app-drop-link 405 170 \
            --hide-extension "$APP_BUNDLE" \
            --hdiutil-quiet \
            "$DMG_PATH" \
            "$APP_PATH" \
            || {
              # create-dmg exits non-zero on benign cases (e.g. no code
              # sign identity in dry-run). Retry with a minimal invocation
              # just to ensure we still produce a DMG artifact.
              echo "::warning::create-dmg with layout args failed — retrying minimal"
              rm -f "$DMG_PATH"
              create-dmg --volname "${APP_NAME} ${{ steps.ver.outputs.version }}" \
                --hdiutil-quiet \
                "$DMG_PATH" "$APP_PATH"
            }
          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"

      - name: Sign DMG
        if: steps.drymode.outputs.dry_run != 'true'
        run: |
          codesign --force --timestamp \
            --sign "$SIGN_IDENT" \
            "${{ steps.dmg.outputs.dmg_path }}"
          codesign --verify --strict --verbose=2 "${{ steps.dmg.outputs.dmg_path }}"

      - name: Generate SHA256 manifest
        shell: bash
        run: |
          set -euo pipefail
          cd "$(dirname "${{ steps.dmg.outputs.dmg_path }}")"
          shasum -a 256 "$(basename "${{ steps.dmg.outputs.dmg_path }}")" \
            > "${{ steps.dmg.outputs.dmg_path }}.sha256"
          cat "${{ steps.dmg.outputs.dmg_path }}.sha256"

      - name: Cap DMG size (hard ceiling)
        shell: bash
        run: |
          set -euo pipefail
          max_bytes=$((200 * 1024 * 1024))
          actual=$(wc -c < "${{ steps.dmg.outputs.dmg_path }}" | tr -d ' ')
          echo "DMG size: $actual bytes (cap $max_bytes)"
          if [[ $actual -gt $max_bytes ]]; then
            echo "::error::DMG exceeds 200MB ceiling — investigate embedded resources"
            exit 1
          fi

      # ── Artifact upload (always) + Release publish (tag only) ─────
      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ steps.ver.outputs.version }}
          path: |
            ${{ steps.dmg.outputs.dmg_path }}
            ${{ steps.dmg.outputs.dmg_path }}.sha256
          retention-days: 30

      - name: Create GitHub Release (draft)
        if: |
          steps.drymode.outputs.dry_run != 'true' &&
          github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${{ steps.ver.outputs.tag }}" \
            "${{ steps.dmg.outputs.dmg_path }}" \
            "${{ steps.dmg.outputs.dmg_path }}.sha256" \
            --draft \
            --title "Tron Mac ${{ steps.ver.outputs.version }}" \
            --notes "Automated release. See CHANGELOG for details; edit this draft before publishing."

      - name: Summary
        shell: bash
        run: |
          {
            echo "## Mac DMG Build"
            echo ""
            echo "- Version: \`${{ steps.ver.outputs.version }}\`"
            echo "- Mode:    \`${{ steps.ver.outputs.mode }}\`"
            echo "- Dry run: \`${{ steps.drymode.outputs.dry_run }}\`"
            echo "- DMG:     \`$(basename "${{ steps.dmg.outputs.dmg_path }}")\`"
            echo ""
            echo "SHA256:"
            echo ""
            echo "\`\`\`"
            cat "${{ steps.dmg.outputs.dmg_path }}.sha256"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
