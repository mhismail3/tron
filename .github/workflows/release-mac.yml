# Mac DMG Release Pipeline (Plan ¬ßE, Phase 6)
#
# Builds a signed, notarized, stapled DMG for `Tron.app` and attaches it to
# a GitHub Release. Triggered by:
#   - Tag push matching `mac-v*` (e.g. `mac-v0.5.0`, `mac-v0.5.1-beta.1`)
#   - Manual `workflow_dispatch` with an explicit version (enables dry-run
#     without tagging).
#
# ‚îÄ‚îÄ‚îÄ Pipeline overview ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
#
#   1. Resolve the target version from the tag or the manual input.
#   2. Build the Rust agent binary in release mode (cached).
#   3. Stage the agent into the embedded `Tron Server.app` Login Item via
#      `packages/mac-app/scripts/bundle-agent.sh`.
#   4. Generate the Xcode project with XcodeGen and archive the
#      `TronMac` scheme with automatic signing.
#   5. Export the `.app` from the archive (Developer ID Application).
#   6. Notarize via `xcrun notarytool submit --wait`; staple with `stapler`.
#   7. Build the DMG via `create-dmg` into `dist/Tron-mac-vX.Y.Z.dmg`.
#   8. Generate a SHA256 manifest next to the DMG.
#   9. Attach the DMG + manifest to a GitHub Release (draft by default ‚Äî
#      flipped live by a maintainer after verifying the assets).
#
# ‚îÄ‚îÄ‚îÄ Required secrets ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
#
#   MACOS_CERT_P12_BASE64   base64-encoded Developer ID Application cert
#   MACOS_CERT_PASSWORD     password protecting the .p12
#   NOTARIZE_APPLE_ID       Apple ID email for notarytool
#   NOTARIZE_TEAM_ID        Apple Developer team ID
#   NOTARIZE_APP_PASSWORD   app-specific password for the Apple ID
#
# Optional secrets (warned-and-skipped when absent):
#
#   SENTRY_AUTH_TOKEN       org/project token with project:write ‚Äî uploads dSYMs
#   SENTRY_ORG              Sentry organization slug (defaults to "tron")
#   SENTRY_PROJECT_MAC      Sentry project slug for the Mac app (defaults to "tron-mac")
#
# All five required secrets must be present for notarization to run. In
# dry-run mode (workflow_dispatch with `dry_run=true`) missing secrets
# are tolerated and the job short-circuits before the notarization step.
#
# ‚îÄ‚îÄ‚îÄ Secret handling INVARIANT ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
#
# Passwords are NEVER passed on the argv of `security` or `notarytool`
# beyond the unavoidable `security import -P` (the .p12 unwrap has no
# stdin variant on macOS). For notarytool we use a one-time
# `store-credentials --keychain-profile` so the submit step's argv
# carries only the profile name, not the Apple ID / app-password.
#
# The build keychain is created with a unique random password, isolated
# from the runner's `login.keychain`, and DESTROYED in an `if: always()`
# cleanup step so it doesn't outlive the job even if a later step
# fails. Keychain default is restored to `login.keychain-db` to leave
# the runner in a known state for subsequent jobs (fork PRs share
# runners; ephemerality is best-effort).
#
# ‚îÄ‚îÄ‚îÄ Rollback ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
#
# Bad release? `gh release delete mac-vX.Y.Z` pulls the DMG. Existing
# installs are unaffected (they don't auto-pull deletions). Cut a fixed
# release at `mac-vX.Y.Z+1`.

name: Release (Mac DMG)

on:
  push:
    tags:
      - "mac-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 0.5.0-beta.1). Leave blank for tag-driven run."
        required: false
        type: string
      dry_run:
        description: "Skip notarization + release publish (true/false)."
        required: false
        default: "true"
        type: string

concurrency:
  group: release-mac-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # needed for gh release create

jobs:
  build-dmg:
    name: Build + sign + notarize DMG
    runs-on: macos-15
    timeout-minutes: 60

    env:
      # Lifted into the job env so every step sees them.
      APP_NAME: Tron
      APP_BUNDLE: Tron.app
      MAC_APP_DIR: packages/mac-app
      DMG_BASENAME: Tron-mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed so release notes can reference prior tags

      # ‚îÄ‚îÄ Resolve version ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME:-}" == mac-v* ]]; then
            v="${GITHUB_REF_NAME#mac-v}"
            mode="tag"
          elif [[ -n "${{ inputs.version }}" ]]; then
            v="${{ inputs.version }}"
            mode="manual"
          else
            # Manual trigger without a version ‚Üí read MARKETING_VERSION from
            # project.yml so a dry-run still produces consistent artifacts.
            v=$(awk -F'"' '/MARKETING_VERSION:/ { print $2; exit }' "$MAC_APP_DIR/project.yml")
            mode="project.yml"
          fi
          if [[ -z "$v" ]]; then echo "::error::could not resolve version"; exit 1; fi
          {
            echo "version=$v"
            echo "mode=$mode"
            echo "tag=mac-v$v"
            echo "dmg_name=${DMG_BASENAME}-v${v}.dmg"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved version=$v (from $mode)"

      - name: Resolve dry-run flag
        id: drymode
        shell: bash
        run: |
          # Tag pushes default to publish; workflow_dispatch defaults to dry-run.
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            flag="${{ inputs.dry_run }}"
            [[ -z "$flag" ]] && flag="true"
          else
            flag="false"
          fi
          # Also treat missing notarize secrets as an automatic dry-run so
          # forks can exercise the build without the Apple credentials.
          if [[ -z "${{ secrets.MACOS_CERT_P12_BASE64 }}" \
             || -z "${{ secrets.NOTARIZE_APPLE_ID }}" \
             || -z "${{ secrets.NOTARIZE_TEAM_ID }}" \
             || -z "${{ secrets.NOTARIZE_APP_PASSWORD }}" ]]; then
            flag="true"
            echo "::notice::Notarization secrets missing ‚Üí forcing dry-run"
          fi
          echo "dry_run=$flag" >> "$GITHUB_OUTPUT"
          echo "Dry-run=$flag"

      # ‚îÄ‚îÄ Rust toolchain ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: packages/agent

      - name: Build agent (release)
        working-directory: packages/agent
        run: cargo build --release --bin tron --locked

      # ‚îÄ‚îÄ Xcode toolchain ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Pin Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen + create-dmg
        run: |
          brew install xcodegen create-dmg

      - name: Stage agent binary into embedded Login Item
        working-directory: packages/mac-app
        run: |
          # --skip-build because we already built the release binary above;
          # the script just copies + chmod + stages atomically.
          ./scripts/bundle-agent.sh --skip-build

      - name: Generate Xcode project
        working-directory: packages/mac-app
        run: xcodegen generate

      # ‚îÄ‚îÄ Code signing setup ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      #
      # Creates an isolated `tron-build.keychain-db` with a random
      # unlock password, imports the .p12, and stashes notarytool
      # credentials as a keychain-profile so subsequent steps don't
      # need to re-pass the Apple ID / app password on argv.
      #
      # `set +x` is the default; do not enable it here ‚Äî bash xtrace
      # would echo the import command (including `-P`) into the runner
      # log even though GitHub auto-masks the env var value.
      - name: Import codesign cert + notarytool keychain profile
        if: steps.drymode.outputs.dry_run != 'true'
        env:
          CERT_B64:     ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PW:      ${{ secrets.MACOS_CERT_PASSWORD }}
          APPLE_ID:     ${{ secrets.NOTARIZE_APPLE_ID }}
          TEAM_ID:      ${{ secrets.NOTARIZE_TEAM_ID }}
          APP_PASSWORD: ${{ secrets.NOTARIZE_APP_PASSWORD }}
        run: |
          set -eu
          # Path-based keychain (the `-db` suffix is required on
          # macOS 12+ for `security` to address it by absolute path).
          KEYCHAIN="$RUNNER_TEMP/tron-build.keychain-db"
          KEYCHAIN_PW=$(openssl rand -hex 32)
          # Persist the keychain pw to a file readable only by the
          # runner user so the cleanup step can re-unlock for delete.
          # Mode 600; cleared in the always-step.
          umask 077
          KEYCHAIN_PW_FILE="$RUNNER_TEMP/keychain.pw"
          printf '%s' "$KEYCHAIN_PW" > "$KEYCHAIN_PW_FILE"

          CERT_PATH="$RUNNER_TEMP/cert.p12"
          # Decode without echoing ‚Äî base64 reads CERT_B64 from env
          # (auto-masked). `-d` with `-` is portable across BSD/GNU.
          printf '%s' "$CERT_B64" | base64 -d > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          # Lock auto-relock to 6h so a hung notarize doesn't expose
          # the cert indefinitely if cleanup fails.
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"

          # Insert the new keychain at the FRONT of the search list
          # without displacing login.keychain ‚Äî so the cleanup step
          # restores cleanly even if it crashes mid-job.
          ORIG_LIST=$(security list-keychains -d user | tr -d '"' | tr '\n' ' ')
          # shellcheck disable=SC2086 # search list is intentionally word-split
          security list-keychains -d user -s "$KEYCHAIN" $ORIG_LIST
          # The default keychain stays as the runner's login keychain;
          # we never call `security default-keychain -s ...` so a
          # failure here cannot strand the runner.

          security import "$CERT_PATH" \
            -k "$KEYCHAIN" \
            -P "$CERT_PW" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          # Allow codesign to access the imported key without a UI
          # password prompt during the signing steps.
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          rm -f "$CERT_PATH"

          {
            echo "KEYCHAIN=$KEYCHAIN"
            echo "KEYCHAIN_PW_FILE=$KEYCHAIN_PW_FILE"
            echo "NOTARYTOOL_PROFILE=tron-notarize"
          } >> "$GITHUB_ENV"

          # Capture the Developer ID Application identity hash for
          # use as `--sign <hash>` in later codesign invocations.
          security find-identity -v -p codesigning "$KEYCHAIN" > /tmp/identities.txt
          ident=$(grep "Developer ID Application" /tmp/identities.txt | head -1 | awk '{print $2}')
          if [[ -z "$ident" ]]; then
            echo "::error::no Developer ID Application identity found"
            exit 1
          fi
          echo "SIGN_IDENT=$ident" >> "$GITHUB_ENV"

          # Stash notarytool creds in the build keychain as a profile.
          # Subsequent submit calls reference `--keychain-profile
          # tron-notarize --keychain $KEYCHAIN`, so the Apple ID /
          # app-password never appear on the submit argv.
          xcrun notarytool store-credentials tron-notarize \
            --apple-id "$APPLE_ID" \
            --team-id  "$TEAM_ID" \
            --password "$APP_PASSWORD" \
            --keychain "$KEYCHAIN"

      # ‚îÄ‚îÄ Archive + export ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      #
      # Two signing paths:
      #   - Real release: CODE_SIGN_STYLE=Manual + the imported
      #     Developer ID identity. Notarization-ready.
      #   - Dry-run: ad-hoc sign (`-`). Produces a runnable archive
      #     suitable for layout/build verification but unsigned for
      #     distribution. Without this, dry-run on a fork (no cert)
      #     would fail the archive step entirely.
      - name: xcodebuild archive
        working-directory: packages/mac-app
        run: |
          set -euo pipefail
          ARCHIVE_PATH=$(pwd)/build/TronMac.xcarchive
          if [[ "${{ steps.drymode.outputs.dry_run }}" == "true" ]]; then
            xcodebuild archive \
              -project TronMac.xcodeproj \
              -scheme TronMac \
              -configuration Release \
              -archivePath "$ARCHIVE_PATH" \
              -destination 'generic/platform=macOS' \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="-" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              -quiet
          else
            xcodebuild archive \
              -project TronMac.xcodeproj \
              -scheme TronMac \
              -configuration Release \
              -archivePath "$ARCHIVE_PATH" \
              -destination 'generic/platform=macOS' \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="$SIGN_IDENT" \
              OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN" \
              DEVELOPMENT_TEAM="${{ secrets.NOTARIZE_TEAM_ID }}" \
              -quiet
          fi
          echo "ARCHIVE_PATH=$ARCHIVE_PATH" >> "$GITHUB_ENV"

      - name: Locate exported .app
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$ARCHIVE_PATH/Products/Applications/$APP_BUNDLE"
          test -d "$APP_PATH" || { echo "::error::archive missing $APP_BUNDLE"; exit 1; }
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          ls -la "$APP_PATH/Contents/MacOS"
          test -f "$APP_PATH/Contents/Library/LoginItems/Tron Server.app/Contents/MacOS/tron" \
            || { echo "::error::Tron Server.app helper missing"; exit 1; }
          test -f "$APP_PATH/Contents/Library/LaunchAgents/com.tron.server.plist" \
            || { echo "::error::bundled LaunchAgent plist missing"; exit 1; }

      # Inside-out signing ‚Äî required for hardened runtime + notarization.
      #
      # Step 1: sign the embedded helper app. Step 2: sign the OUTER bundle
      # WITHOUT `--deep` so the helper's signature is preserved. The
      # earlier `--deep` flag was a footgun: it recursively re-signs every
      # already-signed binary, blowing away the hardened-runtime + entitlements
      # we just applied to `Tron Server.app`. Apple has deprecated `--deep` for
      # exactly this reason (`man codesign`, "DEEP DEPRECATION").
      #
      # Verification uses `--deep` because it's a read-only walk and we
      # want to confirm the entire bundle tree validates.
      - name: Sign embedded Tron Server helper
        if: steps.drymode.outputs.dry_run != 'true'
        run: |
          set -euo pipefail
          HELPER="$APP_PATH/Contents/Library/LoginItems/Tron Server.app"
          codesign --force --timestamp --options runtime \
            --keychain "$KEYCHAIN" \
            --sign "$SIGN_IDENT" \
            "$HELPER"
          codesign --verify --strict --deep --verbose=2 "$HELPER"

      - name: Re-sign Tron.app with hardened runtime
        if: steps.drymode.outputs.dry_run != 'true'
        run: |
          set -euo pipefail
          # `--preserve-metadata=entitlements,requirements,flags` would
          # also work, but explicit re-sign with the entitlements file
          # is more legible and guarantees the file-on-disk wins.
          codesign --force --timestamp --options runtime \
            --keychain "$KEYCHAIN" \
            --sign "$SIGN_IDENT" \
            --entitlements "$MAC_APP_DIR/TronMac.entitlements" \
            "$APP_PATH"
          # Read-only verification of the whole tree; `--deep` here is
          # safe (it doesn't re-sign).
          codesign --verify --strict --deep --verbose=2 "$APP_PATH"
          # Defence in depth: confirm the helper's signature is still
          # the one we applied above (not silently re-signed by Xcode
          # or replaced by `--deep`).
          codesign --display --verbose=2 "$APP_PATH/Contents/Library/LoginItems/Tron Server.app"

      # ‚îÄ‚îÄ Notarize + staple ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      #
      # Credentials reference the `tron-notarize` profile stored in the
      # build keychain by the import step ‚Äî argv carries only the
      # profile name, never the Apple ID or app-password.
      - name: Notarize
        if: steps.drymode.outputs.dry_run != 'true'
        run: |
          set -euo pipefail
          ZIP_PATH="$RUNNER_TEMP/TronApp-notarize.zip"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"
          xcrun notarytool submit "$ZIP_PATH" \
            --keychain-profile "$NOTARYTOOL_PROFILE" \
            --keychain "$KEYCHAIN" \
            --wait
          rm -f "$ZIP_PATH"

      - name: Staple
        if: steps.drymode.outputs.dry_run != 'true'
        run: xcrun stapler staple "$APP_PATH"

      # ‚îÄ‚îÄ dSYM upload (Sentry) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      #
      # Symbolicates Mac crashes in Sentry. Skipped when SENTRY_AUTH_TOKEN
      # is unset (forks, dry-run, or before Sentry is provisioned).
      # Failures are non-fatal ‚Äî a release without symbol upload is still
      # shippable; we just lose stack-frame symbol resolution for crashes
      # in this build.
      - name: Upload dSYMs to Sentry
        if: |
          steps.drymode.outputs.dry_run != 'true' &&
          env.SENTRY_AUTH_TOKEN != ''
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG:        ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT:    ${{ secrets.SENTRY_PROJECT_MAC }}
        continue-on-error: true
        run: |
          set -euo pipefail
          : "${SENTRY_ORG:=tron}"
          : "${SENTRY_PROJECT:=tron-mac}"
          # Install sentry-cli if not present (the macos-15 image ships
          # without it).
          if ! command -v sentry-cli >/dev/null 2>&1; then
            brew install getsentry/tools/sentry-cli
          fi
          DSYM_DIR="$ARCHIVE_PATH/dSYMs"
          if [[ ! -d "$DSYM_DIR" ]]; then
            echo "::warning::no dSYMs found at $DSYM_DIR ‚Äî skipping upload"
            exit 0
          fi
          sentry-cli debug-files upload \
            --org "$SENTRY_ORG" \
            --project "$SENTRY_PROJECT" \
            --include-sources \
            --wait \
            "$DSYM_DIR"
          # Tag the release in Sentry so the dSYMs are associated with
          # the version users see in their crash dialog.
          sentry-cli releases new \
            --org "$SENTRY_ORG" \
            --project "$SENTRY_PROJECT" \
            "tron-mac@${{ steps.ver.outputs.version }}"
          sentry-cli releases finalize \
            --org "$SENTRY_ORG" \
            --project "$SENTRY_PROJECT" \
            "tron-mac@${{ steps.ver.outputs.version }}"

      # ‚îÄ‚îÄ DMG assembly ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Build DMG
        id: dmg
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          DMG_PATH="$(pwd)/dist/${{ steps.ver.outputs.dmg_name }}"
          # `--skip-jenkins` keeps create-dmg from trying to open a GUI
          # window on the headless runner. `--hdiutil-quiet` suppresses
          # the verbose Apple tooling output that otherwise spams logs.
          create-dmg \
            --volname "${APP_NAME} ${{ steps.ver.outputs.version }}" \
            --window-size 540 340 \
            --icon "$APP_BUNDLE" 135 170 \
            --app-drop-link 405 170 \
            --hide-extension "$APP_BUNDLE" \
            --hdiutil-quiet \
            "$DMG_PATH" \
            "$APP_PATH" \
            || {
              # create-dmg exits non-zero on benign cases (e.g. no code
              # sign identity in dry-run). Retry with a minimal invocation
              # just to ensure we still produce a DMG artifact.
              echo "::warning::create-dmg with layout args failed ‚Äî retrying minimal"
              rm -f "$DMG_PATH"
              create-dmg --volname "${APP_NAME} ${{ steps.ver.outputs.version }}" \
                --hdiutil-quiet \
                "$DMG_PATH" "$APP_PATH"
            }
          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"

      - name: Sign DMG
        if: steps.drymode.outputs.dry_run != 'true'
        run: |
          set -euo pipefail
          codesign --force --timestamp \
            --keychain "$KEYCHAIN" \
            --sign "$SIGN_IDENT" \
            "${{ steps.dmg.outputs.dmg_path }}"
          codesign --verify --strict --verbose=2 "${{ steps.dmg.outputs.dmg_path }}"

      # Stapling the DMG (post-notarize, post-sign) embeds the
      # notarization ticket so first-run on an offline Mac doesn't
      # have to round-trip to Apple.
      - name: Staple DMG
        if: steps.drymode.outputs.dry_run != 'true'
        run: xcrun stapler staple "${{ steps.dmg.outputs.dmg_path }}"

      - name: Generate SHA256 manifest
        shell: bash
        run: |
          set -euo pipefail
          cd "$(dirname "${{ steps.dmg.outputs.dmg_path }}")"
          shasum -a 256 "$(basename "${{ steps.dmg.outputs.dmg_path }}")" \
            > "${{ steps.dmg.outputs.dmg_path }}.sha256"
          cat "${{ steps.dmg.outputs.dmg_path }}.sha256"

      - name: Cap DMG size (hard ceiling)
        shell: bash
        run: |
          set -euo pipefail
          max_bytes=$((200 * 1024 * 1024))
          actual=$(wc -c < "${{ steps.dmg.outputs.dmg_path }}" | tr -d ' ')
          echo "DMG size: $actual bytes (cap $max_bytes)"
          if [[ $actual -gt $max_bytes ]]; then
            echo "::error::DMG exceeds 200MB ceiling ‚Äî investigate embedded resources"
            exit 1
          fi

      # ‚îÄ‚îÄ Artifact upload (always) + Release publish (tag only) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ steps.ver.outputs.version }}
          path: |
            ${{ steps.dmg.outputs.dmg_path }}
            ${{ steps.dmg.outputs.dmg_path }}.sha256
          retention-days: 30

      # Idempotent: re-running the same tag (e.g. after fixing a CI
      # config bug and re-pushing the tag) replaces the assets on the
      # existing draft instead of failing with "release already exists".
      # If the release was already published (not a draft), we still
      # upload + clobber ‚Äî but we DO NOT change its publish state, so
      # operators can recover an over-eager publish without deleting
      # the release first.
      - name: Create or update GitHub Release (draft)
        if: |
          steps.drymode.outputs.dry_run != 'true' &&
          github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.ver.outputs.tag }}"
          DMG="${{ steps.dmg.outputs.dmg_path }}"
          SHA="${{ steps.dmg.outputs.dmg_path }}.sha256"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::notice::Release $TAG already exists ‚Äî uploading assets with --clobber"
            gh release upload "$TAG" "$DMG" "$SHA" --clobber
          else
            gh release create "$TAG" "$DMG" "$SHA" \
              --draft \
              --title "Tron Mac ${{ steps.ver.outputs.version }}" \
              --notes "Automated release. See CHANGELOG for details; edit this draft before publishing."
          fi

      - name: Summary
        shell: bash
        run: |
          {
            echo "## Mac DMG Build"
            echo ""
            echo "- Version: \`${{ steps.ver.outputs.version }}\`"
            echo "- Mode:    \`${{ steps.ver.outputs.mode }}\`"
            echo "- Dry run: \`${{ steps.drymode.outputs.dry_run }}\`"
            echo "- DMG:     \`$(basename "${{ steps.dmg.outputs.dmg_path }}")\`"
            echo ""
            echo "SHA256:"
            echo ""
            echo "\`\`\`"
            cat "${{ steps.dmg.outputs.dmg_path }}.sha256"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # ‚îÄ‚îÄ Cleanup (always) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      #
      # Destroys the build keychain and shreds the password file even
      # when an earlier step failed. Without this, the cert + notarytool
      # creds linger on a runner that may be re-used for an unrelated
      # job (GitHub-hosted runners are nominally ephemeral, but
      # self-hosted runners on a fork are not ‚Äî defence-in-depth is
      # cheap and we lose nothing by always cleaning up).
      #
      # Idempotent: every operation tolerates the keychain or file
      # being absent (the import step may have failed before creating
      # them, or the dry-run path skipped them entirely).
      - name: Tear down build keychain
        if: always()
        shell: bash
        run: |
          set +e
          if [[ -n "${KEYCHAIN:-}" && -f "$KEYCHAIN" ]]; then
            # Remove from the search list before delete so a later
            # step (e.g. another job in this runner) doesn't trip on
            # a stale path entry.
            ORIG_LIST=$(security list-keychains -d user | tr -d '"' | tr '\n' ' ')
            NEW_LIST=$(echo "$ORIG_LIST" | tr ' ' '\n' | grep -vF "$KEYCHAIN" | tr '\n' ' ')
            # shellcheck disable=SC2086 # search list is intentionally word-split
            security list-keychains -d user -s $NEW_LIST 2>/dev/null || true
            security delete-keychain "$KEYCHAIN" 2>/dev/null || true
            echo "deleted $KEYCHAIN"
          fi
          if [[ -n "${KEYCHAIN_PW_FILE:-}" && -f "$KEYCHAIN_PW_FILE" ]]; then
            # Best-effort overwrite; `rm` alone leaves the bytes on disk
            # for SSD wear-leveling reasons but the file is unreadable
            # to other users by mode-600 anyway. The shred is for
            # operators reading the runner's disk image post-job.
            dd if=/dev/urandom of="$KEYCHAIN_PW_FILE" bs=64 count=1 conv=notrunc 2>/dev/null || true
            rm -f "$KEYCHAIN_PW_FILE"
            echo "shredded $KEYCHAIN_PW_FILE"
          fi
          # Drop any stray cert path that might have survived a mid-step crash.
          rm -f "$RUNNER_TEMP/cert.p12" 2>/dev/null || true
          exit 0
