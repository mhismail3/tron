# iOS TestFlight Release Pipeline
#
# Uploads the production iOS bundle (`com.tron.mobile`) to App Store Connect
# and advances it through the TestFlight release states. Externally testable
# builds are assigned to the public TestFlight group; first-build/new-version
# review waits exit successfully as pending Apple Beta App Review. Triggered by
# the same `server-v*` tags that cut the Mac DMG release, so one release tag
# advances both Apple build numbers from VERSION.env.
#
# Required secrets:
#   ASC_KEY_ID        App Store Connect API key id
#   ASC_ISSUER_ID     App Store Connect issuer id
#   ASC_KEY_P8_BASE64 base64-encoded private key contents for the API key
#
# Optional signing secrets for deterministic GitHub Actions exports when Xcode
# cloud signing is unavailable for the ASC API key:
#   IOS_DISTRIBUTION_CERT_P12_BASE64            base64-encoded Apple Distribution .p12
#   IOS_DISTRIBUTION_CERT_PASSWORD              password for that .p12
#   IOS_APPSTORE_PROFILE_BASE64                 base64-encoded App Store profile for com.tron.mobile
#   IOS_SHARE_EXTENSION_APPSTORE_PROFILE_BASE64 base64-encoded App Store profile for com.tron.mobile.ShareExtension
#
# Required repository variables:
#   ASC_TESTFLIGHT_INTERNAL_GROUP_ID existing internal TestFlight group id
#   ASC_TESTFLIGHT_PUBLIC_GROUP_ID   existing public TestFlight group id
#
# Real releases archive the Prod app, export with Apple's app-store-connect
# method, then upload with `asc builds upload`. Exports use explicit manual
# signing when the optional iOS signing secrets are configured; otherwise they
# fall back to Xcode cloud signing through the ASC API key. The app declares
# `ITSAppUsesNonExemptEncryption=false`; CI also patches reused builds that were
# uploaded before that key existed so idempotent reruns can still distribute.
# Dry-runs still create an unsigned IPA from the archive to validate package
# layout without requiring Apple signing credentials.

name: Release (iOS TestFlight)

on:
  push:
    tags:
      - "server-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build/test only; skip ASC upload + TestFlight distribution (true/false)."
        required: false
        default: "true"
        type: string

concurrency:
  group: release-ios-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  testflight:
    name: Build + upload + distribute
    runs-on: macos-15
    timeout-minutes: 90

    env:
      ASC_APP_ID: "6761511764"
      IOS_APP_DIR: packages/ios-app
      IOS_SCHEME: Tron
      IOS_CONFIGURATION: Prod
      IOS_BUNDLE_ID: com.tron.mobile
      IOS_SHARE_EXTENSION_BUNDLE_ID: com.tron.mobile.ShareExtension
      APPLE_TEAM_ID: MYGKXH6TY4
      IOS_DISTRIBUTION_IDENTITY: Apple Distribution

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/tron version check
          while IFS='=' read -r key value; do
            case "$key" in
              TRON_VERSION) version="$value" ;;
              TRON_RELEASE_TAG) tag="$value" ;;
              TRON_DISPLAY_VERSION) display_version="$value" ;;
              TRON_APPLE_BUILD) apple_build="$value" ;;
              TRON_APPLE_MARKETING_VERSION) marketing_version="$value" ;;
            esac
          done < <(./scripts/tron version print)

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME:-}" == server-v* ]]; then
            if [[ "${GITHUB_REF_NAME}" != "$tag" ]]; then
              echo "::error::tag ${GITHUB_REF_NAME} does not match VERSION.env release tag $tag"
              exit 1
            fi
            mode="tag"
          else
            mode="VERSION.env"
          fi
          if [[ -z "${version:-}" || -z "${tag:-}" || -z "${display_version:-}" || -z "${apple_build:-}" || -z "${marketing_version:-}" ]]; then
            echo "::error::could not resolve centralized version fields"
            exit 1
          fi
          {
            echo "version=$version"
            echo "mode=$mode"
            echo "tag=$tag"
            echo "display_version=$display_version"
            echo "apple_build=$apple_build"
            echo "marketing_version=$marketing_version"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved iOS release $version / Apple build $apple_build from $mode"

      - name: Resolve dry-run flag
        id: drymode
        shell: bash
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
          INTERNAL_GROUP_ID: ${{ vars.ASC_TESTFLIGHT_INTERNAL_GROUP_ID }}
          PUBLIC_GROUP_ID: ${{ vars.ASC_TESTFLIGHT_PUBLIC_GROUP_ID }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            flag="${{ inputs.dry_run }}"
            [[ -z "$flag" ]] && flag="true"
          else
            flag="false"
          fi
          if [[ -z "$ASC_KEY_ID" || -z "$ASC_ISSUER_ID" || -z "$ASC_KEY_P8_BASE64" \
             || -z "$INTERNAL_GROUP_ID" || -z "$PUBLIC_GROUP_ID" ]]; then
            flag="true"
            echo "::notice::ASC secrets or TestFlight group variables missing -> forcing dry-run"
          fi
          echo "dry_run=$flag" >> "$GITHUB_OUTPUT"
          echo "Dry-run=$flag"

      - name: Pin Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen + ASC CLI
        run: brew install xcodegen asc

      - name: Toolchain info
        run: |
          xcodebuild -version
          xcodegen --version
          asc version

      - name: Generate Xcode project
        working-directory: ${{ env.IOS_APP_DIR }}
        run: xcodegen generate

      - name: Verify release build settings
        working-directory: ${{ env.IOS_APP_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          settings="$RUNNER_TEMP/ios-build-settings.txt"
          xcodebuild -showBuildSettings \
            -project TronMobile.xcodeproj \
            -scheme "$IOS_SCHEME" \
            -configuration "$IOS_CONFIGURATION" \
            -destination 'generic/platform=iOS' > "$settings"
          grep -q "PRODUCT_BUNDLE_IDENTIFIER = $IOS_BUNDLE_ID" "$settings"
          grep -q "MARKETING_VERSION = ${{ steps.ver.outputs.marketing_version }}" "$settings"
          grep -q "CURRENT_PROJECT_VERSION = ${{ steps.ver.outputs.apple_build }}" "$settings"
          grep -q "TRON_CANONICAL_VERSION = ${{ steps.ver.outputs.version }}" "$settings"

      - name: Prepare iOS simulator
        shell: bash
        run: |
          set -euo pipefail
          runtimes_json="$RUNNER_TEMP/sim-runtimes.json"
          devices_json="$RUNNER_TEMP/sim-devices.json"
          xcrun simctl list runtimes available --json > "$runtimes_json"
          runtime_id="$(
            jq -r '
              [.runtimes[]
                | select(.platform == "iOS" and .isAvailable == true)
                | select((.supportedDeviceTypes // []) | map(select(.productFamily == "iPhone")) | length > 0)]
              | sort_by(.version | split(".") | map(tonumber))
              | last.identifier // empty
            ' "$runtimes_json"
          )"
          if [[ -z "$runtime_id" ]]; then
            echo "::error::no available iOS simulator runtime with iPhone device types"
            exit 1
          fi
          device_type="$(
            jq -r --arg runtime_id "$runtime_id" '
              [.runtimes[] | select(.identifier == $runtime_id)][0]
              | (.supportedDeviceTypes // []) as $types
              | (($types | map(select(.name == "iPhone 17 Pro")))
                + ($types | map(select(.name == "iPhone 16 Pro")))
                + ($types | map(select(.productFamily == "iPhone"))))
              | .[0].identifier // empty
            ' "$runtimes_json"
          )"
          device_name="$(
            jq -r --arg runtime_id "$runtime_id" --arg device_type "$device_type" '
              [.runtimes[] | select(.identifier == $runtime_id)][0]
              | (.supportedDeviceTypes // [])
              | map(select(.identifier == $device_type))
              | .[0].name // empty
            ' "$runtimes_json"
          )"
          if [[ -z "$device_type" || -z "$device_name" ]]; then
            echo "::error::could not resolve an iPhone simulator device type for $runtime_id"
            exit 1
          fi

          xcrun simctl list devices available --json > "$devices_json"
          udid="$(
            jq -r --arg runtime_id "$runtime_id" --arg device_name "$device_name" '
              (.devices[$runtime_id] // [])
              | map(select(.isAvailable == true and .name == $device_name))
              | .[0].udid // empty
            ' "$devices_json"
          )"
          if [[ -z "$udid" ]]; then
            udid="$(xcrun simctl create "Tron CI $device_name" "$device_type" "$runtime_id")"
            echo "::notice::created $device_name simulator $udid on $runtime_id"
          else
            echo "::notice::using existing $device_name simulator $udid on $runtime_id"
          fi
          xcrun simctl boot "$udid" >/dev/null 2>&1 || true
          xcrun simctl bootstatus "$udid" -b
          echo "IOS_TEST_DESTINATION=platform=iOS Simulator,id=$udid" >> "$GITHUB_ENV"

      - name: xcodebuild test
        working-directory: ${{ env.IOS_APP_DIR }}
        shell: bash
        run: |
          set -o pipefail
          xcodebuild test \
            -project TronMobile.xcodeproj \
            -scheme "$IOS_SCHEME" \
            -configuration Beta \
            -destination "$IOS_TEST_DESTINATION" \
            -derivedDataPath build/TestDerivedData \
            -resultBundlePath TestResults.xcresult \
            -quiet

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-test-results
          path: packages/ios-app/TestResults.xcresult
          retention-days: 7

      - name: Prepare ASC API key
        if: steps.drymode.outputs.dry_run != 'true'
        shell: bash
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          umask 077
          key_path="$RUNNER_TEMP/AuthKey_${ASC_KEY_ID}.p8"
          printf '%s' "$ASC_KEY_P8_BASE64" | base64 -d > "$key_path"
          {
            echo "APPLE_API_KEY_ID=$ASC_KEY_ID"
            echo "APPLE_API_ISSUER_ID=$ASC_ISSUER_ID"
            echo "APPLE_API_KEY_PATH=$key_path"
            echo "ASC_PROFILE=ci"
            echo "ASC_STRICT_AUTH=true"
            echo "ASC_BYPASS_KEYCHAIN=true"
          } >> "$GITHUB_ENV"

      - name: Configure ASC CLI auth
        if: steps.drymode.outputs.dry_run != 'true'
        shell: bash
        run: |
          set -euo pipefail
          asc auth login \
            --bypass-keychain \
            --local \
            --name ci \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer-id "$APPLE_API_ISSUER_ID" \
            --private-key "$APPLE_API_KEY_PATH" \
            --skip-validation
          asc auth status

      - name: Check for existing ASC build
        id: existing
        if: steps.drymode.outputs.dry_run != 'true'
        shell: bash
        run: |
          set -euo pipefail
          build_json="$RUNNER_TEMP/existing-build.json"
          if ! asc builds list \
              --app "$ASC_APP_ID" \
              --version "${{ steps.ver.outputs.marketing_version }}" \
              --build-number "${{ steps.ver.outputs.apple_build }}" \
              --limit 10 \
              --output json > "$build_json"; then
            echo "::error::failed to query App Store Connect for existing build ${{ steps.ver.outputs.apple_build }}"
            exit 1
          fi

          build_id="$(jq -r '(.data // []) | if type == "array" then .[0].id // empty else .id // empty end' "$build_json")"
          if [[ -n "$build_id" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "build_id=$build_id" >> "$GITHUB_OUTPUT"
            echo "::notice::ASC build ${{ steps.ver.outputs.apple_build }} already exists ($build_id); upload will be skipped"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve iOS signing mode
        id: signing
        if: steps.drymode.outputs.dry_run != 'true' && steps.existing.outputs.exists != 'true'
        shell: bash
        env:
          IOS_DISTRIBUTION_CERT_P12_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_P12_BASE64 }}
          IOS_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          IOS_APPSTORE_PROFILE_BASE64: ${{ secrets.IOS_APPSTORE_PROFILE_BASE64 }}
          IOS_SHARE_EXTENSION_APPSTORE_PROFILE_BASE64: ${{ secrets.IOS_SHARE_EXTENSION_APPSTORE_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          manual_values=0
          for value in \
            "$IOS_DISTRIBUTION_CERT_P12_BASE64" \
            "$IOS_DISTRIBUTION_CERT_PASSWORD" \
            "$IOS_APPSTORE_PROFILE_BASE64" \
            "$IOS_SHARE_EXTENSION_APPSTORE_PROFILE_BASE64"; do
            [[ -n "$value" ]] && manual_values=$((manual_values + 1))
          done

          if [[ "$manual_values" -eq 0 ]]; then
            echo "IOS_SIGNING_MODE=automatic" >> "$GITHUB_ENV"
            echo "mode=automatic" >> "$GITHUB_OUTPUT"
            echo "::notice::using automatic Xcode cloud signing for the App Store IPA export"
          elif [[ "$manual_values" -eq 4 ]]; then
            echo "IOS_SIGNING_MODE=manual" >> "$GITHUB_ENV"
            echo "mode=manual" >> "$GITHUB_OUTPUT"
            echo "::notice::using manual App Store signing secrets for the App Store IPA export"
          else
            echo "::error::iOS manual signing secrets are partially configured. Set IOS_DISTRIBUTION_CERT_P12_BASE64, IOS_DISTRIBUTION_CERT_PASSWORD, IOS_APPSTORE_PROFILE_BASE64, and IOS_SHARE_EXTENSION_APPSTORE_PROFILE_BASE64 together, or remove all four to use automatic cloud signing."
            exit 1
          fi

      - name: Prepare manual iOS signing assets
        if: steps.drymode.outputs.dry_run != 'true' && steps.existing.outputs.exists != 'true' && steps.signing.outputs.mode == 'manual'
        shell: bash
        env:
          IOS_DISTRIBUTION_CERT_P12_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_P12_BASE64 }}
          IOS_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          IOS_APPSTORE_PROFILE_BASE64: ${{ secrets.IOS_APPSTORE_PROFILE_BASE64 }}
          IOS_SHARE_EXTENSION_APPSTORE_PROFILE_BASE64: ${{ secrets.IOS_SHARE_EXTENSION_APPSTORE_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          umask 077

          cert_path="$RUNNER_TEMP/ios-distribution.p12"
          keychain_path="$RUNNER_TEMP/ios-signing.keychain-db"
          keychain_password="$(uuidgen)"
          profiles_dir="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$profiles_dir"

          printf '%s' "$IOS_DISTRIBUTION_CERT_P12_BASE64" | base64 -d > "$cert_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" \
            -k "$keychain_path" \
            -P "$IOS_DISTRIBUTION_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/xcodebuild
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -d user -s "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path" | grep -q "$IOS_DISTRIBUTION_IDENTITY" || {
            echo "::error::imported .p12 does not contain an $IOS_DISTRIBUTION_IDENTITY signing identity"
            exit 1
          }

          install_profile() {
            local label="$1" bundle_id="$2" base64_value="$3"
            local profile_path decoded_plist uuid name application_id provisions_all xcode_managed
            profile_path="$RUNNER_TEMP/$label.mobileprovision"
            decoded_plist="$RUNNER_TEMP/$label-profile.plist"
            printf '%s' "$base64_value" | base64 -d > "$profile_path"
            security cms -D -i "$profile_path" -o "$decoded_plist"

            uuid="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$decoded_plist")"
            name="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$decoded_plist")"
            application_id="$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$decoded_plist" 2>/dev/null || true)"
            provisions_all="$(/usr/libexec/PlistBuddy -c 'Print :ProvisionsAllDevices' "$decoded_plist" 2>/dev/null || true)"
            xcode_managed="$(/usr/libexec/PlistBuddy -c 'Print :IsXcodeManaged' "$decoded_plist" 2>/dev/null || true)"
            [[ "$xcode_managed" == "true" ]] || xcode_managed="false"

            if [[ -z "$uuid" ]]; then
              echo "::error::$label provisioning profile is missing a UUID" >&2
              return 1
            fi
            if [[ "$application_id" != "$APPLE_TEAM_ID.$bundle_id" ]]; then
              echo "::error::$label provisioning profile is for '$application_id', expected '$APPLE_TEAM_ID.$bundle_id'" >&2
              return 1
            fi
            if [[ "$provisions_all" == "true" ]] || /usr/libexec/PlistBuddy -c 'Print :ProvisionedDevices' "$decoded_plist" >/dev/null 2>&1; then
              echo "::error::$label provisioning profile is not an App Store Connect distribution profile" >&2
              return 1
            fi

            /bin/cp -f "$profile_path" "$profiles_dir/$uuid.mobileprovision"
            echo "::notice::installed App Store profile '$name' for $bundle_id" >&2
            printf '%s\t%s' "$uuid" "$xcode_managed"
          }

          app_profile_info="$(install_profile app "$IOS_BUNDLE_ID" "$IOS_APPSTORE_PROFILE_BASE64")"
          share_profile_info="$(install_profile share-extension "$IOS_SHARE_EXTENSION_BUNDLE_ID" "$IOS_SHARE_EXTENSION_APPSTORE_PROFILE_BASE64")"
          app_profile_uuid="${app_profile_info%%$'\t'*}"
          app_profile_xcode_managed="${app_profile_info##*$'\t'}"
          share_profile_uuid="${share_profile_info%%$'\t'*}"
          share_profile_xcode_managed="${share_profile_info##*$'\t'}"

          if [[ "$app_profile_xcode_managed" != "$share_profile_xcode_managed" ]]; then
            echo "::error::iOS App Store profiles must both be Xcode-managed or both be manually managed"
            exit 1
          fi

          if [[ "$app_profile_xcode_managed" == "true" ]]; then
            export_signing_style="automatic-local"
            echo "::notice::using automatic export style because the App Store profiles are Xcode-managed"
          else
            export_signing_style="manual"
          fi

          {
            echo "IOS_APP_PROFILE_UUID=$app_profile_uuid"
            echo "IOS_SHARE_PROFILE_UUID=$share_profile_uuid"
            echo "IOS_EXPORT_SIGNING_STYLE=$export_signing_style"
          } >> "$GITHUB_ENV"

      - name: xcodebuild archive
        if: steps.drymode.outputs.dry_run == 'true' || steps.existing.outputs.exists != 'true'
        working-directory: ${{ env.IOS_APP_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          archive_path="$(pwd)/build/TronMobile.xcarchive"
          rm -rf "$archive_path"
          if [[ "${{ steps.drymode.outputs.dry_run }}" == "true" ]]; then
            xcodebuild archive \
              -project TronMobile.xcodeproj \
              -scheme "$IOS_SCHEME" \
              -configuration "$IOS_CONFIGURATION" \
              -archivePath "$archive_path" \
              -destination 'generic/platform=iOS' \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="-" \
              CODE_SIGNING_ALLOWED=NO \
              -quiet
          else
            xcodebuild archive \
              -project TronMobile.xcodeproj \
              -scheme "$IOS_SCHEME" \
              -configuration "$IOS_CONFIGURATION" \
              -archivePath "$archive_path" \
              -destination 'generic/platform=iOS' \
              -allowProvisioningUpdates \
              -authenticationKeyPath "$APPLE_API_KEY_PATH" \
              -authenticationKeyID "$APPLE_API_KEY_ID" \
              -authenticationKeyIssuerID "$APPLE_API_ISSUER_ID" \
              DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
              -quiet
          fi
          echo "ARCHIVE_PATH=$archive_path" >> "$GITHUB_ENV"

      - name: Verify archive
        if: steps.drymode.outputs.dry_run == 'true' || steps.existing.outputs.exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          app_path="$ARCHIVE_PATH/Products/Applications/TronMobile.app"
          test -d "$app_path" || { echo "::error::archive missing TronMobile.app"; exit 1; }
          plist="$app_path/Info.plist"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$plist")" = "$IOS_BUNDLE_ID"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$plist")" = "${{ steps.ver.outputs.marketing_version }}"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$plist")" = "${{ steps.ver.outputs.apple_build }}"
          test "$(/usr/libexec/PlistBuddy -c 'Print :ITSAppUsesNonExemptEncryption' "$plist")" = "false"
          test "$(/usr/libexec/PlistBuddy -c 'Print :TRONCanonicalVersion' "$plist")" = "${{ steps.ver.outputs.version }}"
          appex_plist="$app_path/PlugIns/TronShareExtension.appex/Info.plist"
          test "$(/usr/libexec/PlistBuddy -c 'Print :ITSAppUsesNonExemptEncryption' "$appex_plist")" = "false"

      - name: Upload archive dSYMs
        if: steps.drymode.outputs.dry_run == 'true' || steps.existing.outputs.exists != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-dsyms-${{ steps.ver.outputs.version }}
          path: packages/ios-app/build/TronMobile.xcarchive/dSYMs
          retention-days: 30
          if-no-files-found: warn

      - name: Export App Store IPA
        if: steps.drymode.outputs.dry_run != 'true' && steps.existing.outputs.exists != 'true'
        working-directory: ${{ env.IOS_APP_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          export_dir="$(pwd)/build/export"
          ipa_path="$(pwd)/build/TronMobile.ipa"
          export_options="$RUNNER_TEMP/ios-export-options.plist"
          rm -rf "$export_dir" "$ipa_path"
          mkdir -p "$export_dir"

          export_command_mode="automatic-cloud"
          if [[ "${IOS_SIGNING_MODE:-automatic}" == "manual" && "${IOS_EXPORT_SIGNING_STYLE:-manual}" == "manual" ]]; then
            export_command_mode="manual"
            cat > "$export_options" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
            <key>method</key>
            <string>app-store-connect</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$IOS_BUNDLE_ID</key>
              <string>$IOS_APP_PROFILE_UUID</string>
              <key>$IOS_SHARE_EXTENSION_BUNDLE_ID</key>
              <string>$IOS_SHARE_PROFILE_UUID</string>
            </dict>
            <key>signingCertificate</key>
            <string>$IOS_DISTRIBUTION_IDENTITY</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST
          else
            if [[ "${IOS_SIGNING_MODE:-automatic}" == "manual" ]]; then
              export_command_mode="automatic-local"
            fi
            cat > "$export_options" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST
          fi
          plutil -lint "$export_options"

          if [[ "$export_command_mode" == "manual" || "$export_command_mode" == "automatic-local" ]]; then
            if ! xcodebuild -exportArchive \
                -archivePath "$ARCHIVE_PATH" \
                -exportPath "$export_dir" \
                -exportOptionsPlist "$export_options" \
                -quiet; then
              echo "::error::local App Store export failed. Confirm the .p12 matches the selected App Store provisioning profiles for $IOS_BUNDLE_ID and $IOS_SHARE_EXTENSION_BUNDLE_ID."
              exit 1
            fi
          else
            if ! xcodebuild -exportArchive \
                -archivePath "$ARCHIVE_PATH" \
                -exportPath "$export_dir" \
                -exportOptionsPlist "$export_options" \
                -allowProvisioningUpdates \
                -authenticationKeyPath "$APPLE_API_KEY_PATH" \
                -authenticationKeyID "$APPLE_API_KEY_ID" \
                -authenticationKeyIssuerID "$APPLE_API_ISSUER_ID" \
                -quiet; then
              echo "::error::automatic Xcode cloud signing failed. Grant the ASC API key/account permission to manage App Store signing, or configure the manual iOS signing secrets documented in packages/ios-app/docs/development.md."
              exit 1
            fi
          fi

          exported_ipa="$(find "$export_dir" -maxdepth 1 -name '*.ipa' -print -quit)"
          test -f "$exported_ipa" || { echo "::error::xcodebuild export did not produce an IPA"; exit 1; }
          /bin/cp -f "$exported_ipa" "$ipa_path"
          unzip -tq "$ipa_path"

          validation_dir="$RUNNER_TEMP/ios-ipa-validation"
          rm -rf "$validation_dir"
          mkdir -p "$validation_dir"
          unzip -q "$ipa_path" -d "$validation_dir"
          app_payload="$validation_dir/Payload/TronMobile.app"
          appex_payload="$app_payload/PlugIns/TronShareExtension.appex"
          test -d "$app_payload" || { echo "::error::exported IPA missing TronMobile.app"; exit 1; }
          test -d "$appex_payload" || { echo "::error::exported IPA missing TronShareExtension.appex"; exit 1; }
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$app_payload/Info.plist")" = "$IOS_BUNDLE_ID"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$appex_payload/Info.plist")" = "$IOS_SHARE_EXTENSION_BUNDLE_ID"
          test "$(/usr/libexec/PlistBuddy -c 'Print :ITSAppUsesNonExemptEncryption' "$app_payload/Info.plist")" = "false"
          test "$(/usr/libexec/PlistBuddy -c 'Print :ITSAppUsesNonExemptEncryption' "$appex_payload/Info.plist")" = "false"
          /usr/bin/codesign --verify --strict "$appex_payload"
          /usr/bin/codesign --verify --deep --strict "$app_payload"

          main_entitlements="$RUNNER_TEMP/main-entitlements.plist"
          share_entitlements="$RUNNER_TEMP/share-entitlements.plist"
          /usr/bin/codesign -d --entitlements :- "$app_payload" > "$main_entitlements" 2>/dev/null
          /usr/bin/codesign -d --entitlements :- "$appex_payload" > "$share_entitlements" 2>/dev/null
          test "$(/usr/libexec/PlistBuddy -c 'Print :application-identifier' "$main_entitlements")" = "$APPLE_TEAM_ID.$IOS_BUNDLE_ID"
          test "$(/usr/libexec/PlistBuddy -c 'Print :application-identifier' "$share_entitlements")" = "$APPLE_TEAM_ID.$IOS_SHARE_EXTENSION_BUNDLE_ID"
          test "$(/usr/libexec/PlistBuddy -c 'Print :com.apple.developer.team-identifier' "$main_entitlements")" = "$APPLE_TEAM_ID"
          test "$(/usr/libexec/PlistBuddy -c 'Print :com.apple.developer.team-identifier' "$share_entitlements")" = "$APPLE_TEAM_ID"

          echo "IPA_PATH=$ipa_path" >> "$GITHUB_ENV"

      - name: Package dry-run IPA
        if: steps.drymode.outputs.dry_run == 'true'
        working-directory: ${{ env.IOS_APP_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          ipa_path="$(pwd)/build/TronMobile.ipa"
          work_dir="$(pwd)/build/ipa_work"
          app_source="$ARCHIVE_PATH/Products/Applications/TronMobile.app"
          rm -rf "$work_dir" "$ipa_path"
          mkdir -p "$work_dir/Payload"
          /bin/cp -Rf "$app_source" "$work_dir/Payload/"
          echo "::notice::dry-run IPA is unsigned and is only used to validate package layout"
          (cd "$work_dir" && /usr/bin/zip -qry "$ipa_path" Payload)
          unzip -tq "$ipa_path"
          echo "IPA_PATH=$ipa_path" >> "$GITHUB_ENV"

      - name: Upload dry-run IPA artifact
        if: steps.drymode.outputs.dry_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-dry-run-ipa-${{ steps.ver.outputs.version }}
          path: packages/ios-app/build/TronMobile.ipa
          retention-days: 7
          if-no-files-found: error

      - name: Upload to App Store Connect
        if: steps.drymode.outputs.dry_run != 'true' && steps.existing.outputs.exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          asc builds upload \
            --app "$ASC_APP_ID" \
            --ipa "$IPA_PATH" \
            --version "${{ steps.ver.outputs.marketing_version }}" \
            --build-number "${{ steps.ver.outputs.apple_build }}" \
            --platform IOS \
            --checksum \
            --output json \
            --pretty

      - name: Wait for ASC processing
        if: steps.drymode.outputs.dry_run != 'true'
        shell: bash
        run: |
          set -euo pipefail
          asc builds wait \
            --app "$ASC_APP_ID" \
            --build-number "${{ steps.ver.outputs.apple_build }}" \
            --platform IOS \
            --timeout 45m \
            --poll-interval 30s \
            --fail-on-invalid \
            --output json \
            --pretty

      - name: Resolve processed ASC build
        id: asc_build
        if: steps.drymode.outputs.dry_run != 'true'
        shell: bash
        run: |
          set -euo pipefail
          build_json="$RUNNER_TEMP/processed-build.json"
          asc builds list \
            --app "$ASC_APP_ID" \
            --version "${{ steps.ver.outputs.marketing_version }}" \
            --build-number "${{ steps.ver.outputs.apple_build }}" \
            --limit 10 \
            --output json > "$build_json"
          build_id="$(jq -r '(.data // []) | if type == "array" then .[0].id // empty else .id // empty end' "$build_json")"
          test -n "$build_id" || { echo "::error::could not resolve processed ASC build id"; exit 1; }
          echo "build_id=$build_id" >> "$GITHUB_OUTPUT"
          echo "::notice::resolved ASC build ${{ steps.ver.outputs.apple_build }} as $build_id"

      - name: Resolve export compliance
        id: export_compliance
        if: steps.drymode.outputs.dry_run != 'true'
        shell: bash
        env:
          BUILD_ID: ${{ steps.asc_build.outputs.build_id }}
        run: |
          set -euo pipefail

          detail_json="$RUNNER_TEMP/build-beta-detail.json"
          asc_token() {
            ./scripts/asc-jwt \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer-id "$APPLE_API_ISSUER_ID" \
              --key-path "$APPLE_API_KEY_PATH"
          }
          asc_get() {
            local url="$1" output="$2" http_code
            http_code="$(
              curl -sS \
                -o "$output" \
                -w "%{http_code}" \
                -H "Authorization: Bearer $(asc_token)" \
                -H "Accept: application/json" \
                "$url"
            )"
            if [[ "$http_code" != 2* ]]; then
              cat "$output"
              echo "::error::App Store Connect API GET failed (HTTP $http_code): $url"
              exit 1
            fi
          }
          fetch_detail() {
            asc_get "https://api.appstoreconnect.apple.com/v1/builds/$BUILD_ID/buildBetaDetail" "$detail_json"
            internal_state="$(
              jq -r '.data.attributes.internalBuildState // empty' "$detail_json"
            )"
            external_state="$(
              jq -r '.data.attributes.externalBuildState // empty' "$detail_json"
            )"
            if [[ -z "$internal_state" || -z "$external_state" ]]; then
              echo "::error::could not read TestFlight build beta detail for $BUILD_ID"
              cat "$detail_json"
              exit 1
            fi
          }

          fetch_detail
          echo "::notice::TestFlight states before export-compliance check: internal=$internal_state external=$external_state"
          if [[ "$internal_state" != "MISSING_EXPORT_COMPLIANCE" && "$external_state" != "MISSING_EXPORT_COMPLIANCE" ]]; then
            {
              echo "internal_state=$internal_state"
              echo "external_state=$external_state"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::notice::ASC build $BUILD_ID is missing export compliance; setting usesNonExemptEncryption=false"
          request_body="$RUNNER_TEMP/build-export-compliance.json"
          response_body="$RUNNER_TEMP/build-export-compliance-response.json"
          jq -n --arg id "$BUILD_ID" '{
            data: {
              type: "builds",
              id: $id,
              attributes: {
                usesNonExemptEncryption: false
              }
            }
          }' > "$request_body"
          http_code="$(
            curl -sS \
              -o "$response_body" \
              -w "%{http_code}" \
              -X PATCH \
              -H "Authorization: Bearer $(asc_token)" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              --data-binary "@$request_body" \
              "https://api.appstoreconnect.apple.com/v1/builds/$BUILD_ID"
          )"
          if [[ "$http_code" != 2* ]]; then
            cat "$response_body"
            echo "::error::failed to set usesNonExemptEncryption=false for ASC build $BUILD_ID (HTTP $http_code)"
            exit 1
          fi

          for _ in {1..20}; do
            fetch_detail
            echo "::notice::TestFlight states after export-compliance update: internal=$internal_state external=$external_state"
            if [[ "$internal_state" != "MISSING_EXPORT_COMPLIANCE" && "$external_state" != "MISSING_EXPORT_COMPLIANCE" ]]; then
              {
                echo "internal_state=$internal_state"
                echo "external_state=$external_state"
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 15
          done

          echo "::error::ASC build $BUILD_ID is still missing export compliance after setting usesNonExemptEncryption=false"
          exit 1

      - name: Update TestFlight notes
        if: steps.drymode.outputs.dry_run != 'true'
        shell: bash
        env:
          BUILD_ID: ${{ steps.asc_build.outputs.build_id }}
        run: |
          set -euo pipefail
          notes="Tron ${{ steps.ver.outputs.display_version }} (${{ steps.ver.outputs.version }}), Apple build ${{ steps.ver.outputs.apple_build }}."
          notes_error="$RUNNER_TEMP/testflight-notes-error.log"
          if asc builds test-notes update \
              --build "$BUILD_ID" \
              --locale en-US \
              --whats-new "$notes" \
              --output json \
              --pretty 2> "$notes_error"; then
            exit 0
          fi
          if asc builds test-notes create \
              --build "$BUILD_ID" \
              --locale en-US \
              --whats-new "$notes" \
              --output json \
              --pretty 2> "$notes_error"; then
            exit 0
          fi
          cat "$notes_error"
          echo "::error::failed to create or update TestFlight What to Test notes"
          exit 1

      - name: Submit TestFlight beta review when required
        id: beta_review
        if: steps.drymode.outputs.dry_run != 'true'
        shell: bash
        env:
          BUILD_ID: ${{ steps.asc_build.outputs.build_id }}
        run: |
          set -euo pipefail

          detail_json="$RUNNER_TEMP/beta-review-detail.json"
          submissions_json="$RUNNER_TEMP/beta-review-submissions.json"

          asc_token() {
            ./scripts/asc-jwt \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer-id "$APPLE_API_ISSUER_ID" \
              --key-path "$APPLE_API_KEY_PATH"
          }

          asc_get() {
            local url="$1" output="$2" http_code
            http_code="$(
              curl -sS \
                -o "$output" \
                -w "%{http_code}" \
                -H "Authorization: Bearer $(asc_token)" \
                -H "Accept: application/json" \
                "$url"
            )"
            if [[ "$http_code" != 2* ]]; then
              cat "$output"
              echo "::error::App Store Connect API GET failed (HTTP $http_code): $url"
              exit 1
            fi
          }

          fetch_external_state() {
            asc_get "https://api.appstoreconnect.apple.com/v1/builds/$BUILD_ID/buildBetaDetail" "$detail_json"
            external_state="$(
              jq -r '.data.attributes.externalBuildState // empty' "$detail_json"
            )"
            test -n "$external_state" || { echo "::error::could not read external TestFlight state"; cat "$detail_json"; exit 1; }
          }

          fetch_review_state() {
            asc_get "https://api.appstoreconnect.apple.com/v1/betaAppReviewSubmissions?filter%5Bbuild%5D=$BUILD_ID" "$submissions_json"
            review_state="$(
              jq -r '(.data // []) | sort_by(.attributes.submittedDate // "") | last | .attributes.betaReviewState // empty' "$submissions_json"
            )"
          }

          submit_beta_review() {
            request_body="$RUNNER_TEMP/beta-review-submission.json"
            response_body="$RUNNER_TEMP/beta-review-submission-response.json"
            jq -n --arg build_id "$BUILD_ID" '{
              data: {
                type: "betaAppReviewSubmissions",
                relationships: {
                  build: {
                    data: {
                      type: "builds",
                      id: $build_id
                    }
                  }
                }
              }
            }' > "$request_body"
            http_code="$(
              curl -sS \
                -o "$response_body" \
                -w "%{http_code}" \
                -X POST \
                -H "Authorization: Bearer $(asc_token)" \
                -H "Content-Type: application/json" \
                -H "Accept: application/json" \
                --data-binary "@$request_body" \
                "https://api.appstoreconnect.apple.com/v1/betaAppReviewSubmissions"
            )"
            if [[ "$http_code" != 2* ]]; then
              cat "$response_body"
              echo "::error::failed to submit ASC build $BUILD_ID for TestFlight beta review (HTTP $http_code)"
              exit 1
            fi
          }

          write_outputs() {
            local external_ready="$1" review_pending="$2" disposition="$3"
            {
              echo "external_state=$external_state"
              echo "review_state=$review_state"
              echo "external_ready=$external_ready"
              echo "review_pending=$review_pending"
              echo "disposition=$disposition"
            } >> "$GITHUB_OUTPUT"
          }

          handle_terminal_state() {
            fetch_external_state
            fetch_review_state
            echo "::notice::external TestFlight state: $external_state; review=$review_state"

            case "$review_state" in
              REJECTED)
                echo "::error::TestFlight beta review rejected ASC build $BUILD_ID"
                exit 1
                ;;
              APPROVED)
                write_outputs true false approved
                exit 0
                ;;
            esac

            case "$external_state" in
              READY_FOR_BETA_TESTING|IN_BETA_TESTING|BETA_APPROVED|BETA_TESTING|AVAILABLE_FOR_EXTERNAL_TESTING)
                write_outputs true false externally-ready
                exit 0
                ;;
              WAITING_FOR_BETA_REVIEW|IN_BETA_REVIEW)
                echo "::notice::ASC build $BUILD_ID is waiting for Apple Beta App Review; treating this as a successful pending-review release checkpoint"
                write_outputs false true waiting-for-beta-review
                exit 0
                ;;
              BETA_REJECTED|EXPIRED|PROCESSING_EXCEPTION)
                echo "::error::external TestFlight state is $external_state for ASC build $BUILD_ID"
                exit 1
                ;;
            esac

            case "$review_state" in
              WAITING_FOR_REVIEW|IN_REVIEW)
                echo "::notice::ASC build $BUILD_ID is waiting for Apple Beta App Review; treating this as a successful pending-review release checkpoint"
                write_outputs false true waiting-for-beta-review
                exit 0
                ;;
            esac
          }

          fetch_external_state
          fetch_review_state
          echo "::notice::external TestFlight state before beta-review check: $external_state; review=$review_state"

          if [[ "$review_state" == "REJECTED" ]]; then
            echo "::error::TestFlight beta review rejected ASC build $BUILD_ID"
            exit 1
          fi

          if [[ "$external_state" == "READY_FOR_BETA_SUBMISSION" && -z "$review_state" ]]; then
            submit_beta_review
          fi

          handle_terminal_state

          if [[ "$external_state" == "READY_FOR_BETA_SUBMISSION" ]]; then
            echo "::notice::ASC build $BUILD_ID is ready for beta submission but no review submission was visible yet; retry this workflow after App Store Connect settles"
            write_outputs false true ready-for-beta-submission
            exit 0
          fi

          echo "::error::unexpected external TestFlight state '$external_state' with review state '$review_state'"
          exit 1

      - name: Validate TestFlight groups
        id: testflight_groups
        if: steps.drymode.outputs.dry_run != 'true' && steps.beta_review.outputs.external_ready == 'true'
        shell: bash
        env:
          INTERNAL_GROUP_ID: ${{ vars.ASC_TESTFLIGHT_INTERNAL_GROUP_ID }}
          PUBLIC_GROUP_ID: ${{ vars.ASC_TESTFLIGHT_PUBLIC_GROUP_ID }}
        run: |
          set -euo pipefail
          groups_json="$RUNNER_TEMP/testflight-groups.json"
          groups_error="$RUNNER_TEMP/testflight-groups-error.log"
          # ASC CLI releases have exposed both command shapes; keep the
          # compatibility path explicit while still failing if neither works.
          if asc testflight beta-groups list \
              --app "$ASC_APP_ID" \
              --output json > "$groups_json" 2> "$groups_error"; then
            :
          elif asc testflight groups list \
              --app "$ASC_APP_ID" \
              --output json > "$groups_json" 2> "$groups_error"; then
            :
          else
            cat "$groups_error"
            echo "::error::failed to list TestFlight groups with asc"
            exit 1
          fi

          internal_kind="$(
            jq -r --arg id "$INTERNAL_GROUP_ID" '
              (.data // [])
              | map(select(.id == $id))
              | .[0].attributes.isInternalGroup // empty
            ' "$groups_json"
          )"
          internal_all_builds="$(
            jq -r --arg id "$INTERNAL_GROUP_ID" '
              (.data // [])
              | map(select(.id == $id))
              | .[0].attributes.hasAccessToAllBuilds // empty
            ' "$groups_json"
          )"
          public_kind="$(
            jq -r --arg id "$PUBLIC_GROUP_ID" '
              (.data // [])
              | map(select(.id == $id))
              | .[0].attributes.isInternalGroup // false
            ' "$groups_json"
          )"
          public_link="$(
            jq -r --arg id "$PUBLIC_GROUP_ID" '
              (.data // [])
              | map(select(.id == $id))
              | .[0].attributes.publicLinkEnabled // false
            ' "$groups_json"
          )"

          if [[ "$internal_kind" != "true" ]]; then
            echo "::error::ASC_TESTFLIGHT_INTERNAL_GROUP_ID does not identify an internal TestFlight group"
            exit 1
          fi
          if [[ "$internal_all_builds" != "true" ]]; then
            echo "::error::internal TestFlight groups cannot be directly assigned by the ASC API; enable access to all builds for ASC_TESTFLIGHT_INTERNAL_GROUP_ID"
            exit 1
          fi
          if [[ "$public_kind" == "true" ]]; then
            echo "::error::ASC_TESTFLIGHT_PUBLIC_GROUP_ID points at an internal TestFlight group"
            exit 1
          fi
          if [[ "$public_link" != "true" ]]; then
            echo "::error::ASC_TESTFLIGHT_PUBLIC_GROUP_ID must be the public-link TestFlight group used by onboarding"
            exit 1
          fi

          echo "::notice::internal TestFlight group has access to all builds; assigning the processed build to the public group"
          echo "external_group_ids=$PUBLIC_GROUP_ID" >> "$GITHUB_OUTPUT"

      - name: Distribute to TestFlight groups
        if: steps.drymode.outputs.dry_run != 'true' && steps.beta_review.outputs.external_ready == 'true'
        shell: bash
        env:
          BUILD_ID: ${{ steps.asc_build.outputs.build_id }}
          EXTERNAL_GROUP_IDS: ${{ steps.testflight_groups.outputs.external_group_ids }}
        run: |
          set -euo pipefail
          groups="$EXTERNAL_GROUP_IDS"
          test -n "$groups" || { echo "::error::no external TestFlight groups resolved"; exit 1; }
          notes="Tron ${{ steps.ver.outputs.display_version }} (${{ steps.ver.outputs.version }}), Apple build ${{ steps.ver.outputs.apple_build }}."
          asc publish testflight \
            --app "$ASC_APP_ID" \
            --build "$BUILD_ID" \
            --group "$groups" \
            --test-notes "$notes" \
            --locale en-US \
            --wait \
            --timeout 45m \
            --poll-interval 30s \
            --output json \
            --pretty

      - name: Summary
        shell: bash
        run: |
          {
            echo "## iOS TestFlight Release"
            echo ""
            echo "- Version: \`${{ steps.ver.outputs.version }}\`"
            echo "- Display: \`${{ steps.ver.outputs.display_version }}\`"
            echo "- Apple build: \`${{ steps.ver.outputs.apple_build }}\`"
            echo "- Bundle: \`$IOS_BUNDLE_ID\`"
            echo "- Dry run: \`${{ steps.drymode.outputs.dry_run }}\`"
            if [[ "${{ steps.drymode.outputs.dry_run }}" != "true" ]]; then
              echo "- ASC app: \`$ASC_APP_ID\`"
              echo "- Existing build reused: \`${{ steps.existing.outputs.exists || 'false' }}\`"
              echo "- External TestFlight state: \`${{ steps.beta_review.outputs.external_state || 'unknown' }}\`"
              echo "- Beta review state: \`${{ steps.beta_review.outputs.review_state || 'unknown' }}\`"
              echo "- Beta review disposition: \`${{ steps.beta_review.outputs.disposition || 'not-run' }}\`"
              if [[ "${{ steps.beta_review.outputs.review_pending || 'false' }}" == "true" ]]; then
                echo "- Distribution: pending Apple Beta App Review; rerun after approval to assign the public TestFlight group."
              elif [[ "${{ steps.beta_review.outputs.external_ready || 'false' }}" == "true" ]]; then
                echo "- Distribution: public TestFlight group assignment attempted."
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"
