# Continuous Integration
#
# Six workloads, two cost tiers:
#   - personal-info-guard: ubuntu, ~30s, runs every PR + push (always).
#   - version-drift:       ubuntu, ~10s, validates VERSION.env mirrors.
#   - rust-static-gates:   ubuntu (1x), runs the same named closeout target
#                          set as `scripts/tron ci test` for docs/templates,
#                          iOS, Mac, agent, script, and CI changes.
#   - rust:                ubuntu (1x), runs when packages/agent/** changes,
#                          on every push to main, or when labeled `rust`.
#   - ios:                 macos (10x), runs when packages/ios-app/** changes,
#                          on every push to main, or when labeled `ios`.
#   - mac:                 macos (10x), runs when packages/mac-app/** or
#                          packages/agent/** changes (the Rust binary is
#                          embedded in the Mac app bundle), on every push to
#                          main, or when labeled `mac`. Also exercises a
#                          dry-run DMG assembly on PR to catch release-mac.yml
#                          drift before tag push.
#
# Path-gating happens via `dorny/paths-filter` for static Rust gates, Rust,
# iOS, and Mac so PRs that only touch docs or the other platform don't burn
# macOS minutes. The guard jobs always run. Pushes to main always run
# everything to catch cross-cutting regressions.
#
# Concurrency: in-flight runs for the same PR are cancelled on new pushes
# (cheap on push to main — only one run can be in flight there anyway).
#
# Adding a new ecosystem:
#   1. Add a filter under `changes.steps.filter`.
#   2. Add a new job gated on `needs.changes.outputs.<name>` + label.
#   3. List the job under `ci.needs` + the result-check loop.
#   4. Document in CONTRIBUTING.md.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel previous in-flight runs for the same PR to avoid macOS minute waste.
# Pushes to main never cancel — full-history validation is the goal there.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      static_gates: ${{ steps.filter.outputs.static_gates }}
      ios: ${{ steps.filter.outputs.ios }}
      mac: ${{ steps.filter.outputs.mac }}
      scripts: ${{ steps.filter.outputs.scripts }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'packages/agent/**'
              - '.github/workflows/ci.yml'
            static_gates:
              - '.github/pull_request_template.md'
              - '.github/ISSUE_TEMPLATE/**'
              - '.github/workflows/ci.yml'
              - 'README.md'
              - 'CONTRIBUTING.md'
              - 'AGENTS.md'
              - 'packages/agent/docs/**'
              - 'packages/ios-app/**'
              - 'packages/mac-app/**'
              - 'scripts/**'
            ios:
              - 'packages/ios-app/**'
              - '.github/workflows/ci.yml'
            mac:
              - 'packages/mac-app/**'
              - '.github/workflows/ci.yml'
            scripts:
              - 'scripts/**'
              - '.github/workflows/ci.yml'

  personal-info-guard:
    name: Personal-info guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so `git grep` sees everything, not just the PR diff.
          fetch-depth: 0
      - name: Run personal-info-guard
        run: ./scripts/personal-info-guard.sh

  version-drift:
    name: Version drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check centralized version mirrors
        run: ./scripts/tron version check
      - name: Run version helper tests
        run: ./scripts/tron version test
      - name: Run release notes helper tests
        run: ./scripts/tron-release-notes --test

  rust-static-gates:
    name: Rust static gates
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.event_name == 'push' ||
      needs.changes.outputs.static_gates == 'true' ||
      needs.changes.outputs.rust == 'true' ||
      needs.changes.outputs.scripts == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'rust')
    defaults:
      run:
        working-directory: packages/agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: packages/agent

      - name: Run Rust-owned closeout target set
        run: |
          cargo test --test db_path_guard -- --quiet
          cargo test --test primitive_engine_teardown_plan_invariants -- --quiet
          cargo test --test determinism_replayability_invariants -- --quiet
          cargo test --test primitive_code_cleanup_invariants -- --quiet
          cargo test --test hierarchical_rearchitecture_invariants -- --quiet
          cargo test --test post_hra_adversarial_hardening_invariants -- --quiet
          cargo test --test post_aha_adversarial_closeout_invariants -- --quiet
          cargo test --test concurrency_scheduling_discipline_invariants -- --quiet
          cargo test --test security_authority_capability_boundaries_invariants -- --quiet
          cargo test --test observability_diagnostics_auditability_invariants -- --quiet
          cargo test --test off_plan_saa_authorship_teardown_cleanup_invariants -- --quiet
          cargo test --test data_integrity_storage_evolution_migration_discipline_invariants -- --quiet
          cargo test --test public_protocol_api_contract_discipline_invariants -- --quiet
          cargo test --test provider_model_boundary_discipline_invariants -- --quiet
          cargo test --test performance_resource_governance_invariants -- --quiet
          cargo test --test configuration_profile_environment_discipline_invariants -- --quiet
          cargo test --test release_install_upgrade_rollback_discipline_invariants -- --quiet
          cargo test --test primitive_trace_execution -- --quiet
          cargo test --test integration -- --test-threads=1 --quiet

  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.event_name == 'push' ||
      needs.changes.outputs.rust == 'true' ||
      needs.changes.outputs.scripts == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'rust')
    defaults:
      run:
        working-directory: packages/agent
    steps:
      - uses: actions/checkout@v4

      # `actions-rust-lang/setup-rust-toolchain` reads packages/agent/rust-toolchain.toml
      # automatically, so it picks up the pinned channel + components (rustfmt, clippy).
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: packages/agent

      - name: Toolchain info
        run: |
          rustc --version
          cargo --version
          cargo fmt --version
          cargo clippy --version

      # fmt + clippy are ADVISORY: the tree has ~2k fmt diffs and ~1k clippy
      # warnings predating this CI pipeline. They surface in PR checks as ⚠️
      # but do NOT block merge. Promoting either to enforcing requires a
      # workspace-wide cleanup commit first (a `cargo fmt` baseline + a
      # clippy-warning triage pass). Until then, removing `continue-on-error`
      # would red-line every PR — keep advisory state.
      #
      # Tracked as an out-of-scope follow-up; do not edit `continue-on-error`
      # without first running the workspace cleanup.
      - name: cargo fmt --check (advisory)
        continue-on-error: true
        run: cargo fmt --check

      - name: cargo clippy (advisory)
        continue-on-error: true
        run: cargo clippy --all-targets

      - name: cargo check
        run: cargo check

      # Match the local `scripts/tron ci test` harness exactly, including
      # serial integration execution for `--test integration`.
      - name: scripts/tron ci test
        working-directory: ${{ github.workspace }}
        run: scripts/tron ci test

  ios:
    name: iOS (xcodebuild test)
    runs-on: macos-15
    needs: changes
    if: |
      github.event_name == 'push' ||
      needs.changes.outputs.ios == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'ios')
    defaults:
      run:
        working-directory: packages/ios-app
    steps:
      - uses: actions/checkout@v4

      # Pin to the latest stable Xcode the runner image has installed. The
      # iOS app's project.yml requires Xcode 26+ (xcodeVersion: "2640"); when
      # this fails on a runner upgrade, bump to a runner image that ships it.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Toolchain info
        run: |
          xcodebuild -version
          swift --version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Verify generated Xcode project is committed
        working-directory: ${{ github.workspace }}
        run: git diff --exit-code packages/ios-app/TronMobile.xcodeproj

      - name: List available iOS simulators
        run: xcrun simctl list devices available | head -60

      # NOTE: destination uses `OS=latest` and a generic `iPhone` family so
      # the test job survives Xcode/Simulator upgrades. The user's local
      # machine targets `iPhone 17 Pro` specifically; CI is more permissive.
      - name: xcodebuild test
        run: |
          set -o pipefail
          xcodebuild test \
            -project TronMobile.xcodeproj \
            -scheme Tron \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 17 Pro' \
            -resultBundlePath TestResults.xcresult \
            -quiet

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: packages/ios-app/TestResults.xcresult
          retention-days: 7

  mac:
    name: Mac wrapper (build + test, dry-run DMG)
    runs-on: macos-15
    needs: changes
    if: |
      github.event_name == 'push' ||
      needs.changes.outputs.mac == 'true' ||
      needs.changes.outputs.rust == 'true' ||
      contains(github.event.pull_request.labels.*.name, 'mac')
    defaults:
      run:
        working-directory: packages/mac-app
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # The Rust agent is embedded as a Resource in the Mac app bundle.
      # CI builds a debug-profile copy so `scripts/bundle-agent.sh`
      # succeeds, but we don't ship this binary — the release pipeline
      # (release-mac.yml) rebuilds it in `--release` with signing.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workspaces: packages/agent

      - name: Build agent helper (debug, for embedding)
        working-directory: packages/agent
        run: cargo build --bin tron --locked

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Stage agent helper binary
        run: ./scripts/bundle-agent.sh --skip-build --profile debug

      - name: Validate staged helper binary
        run: |
          test -x "Sources/Resources/Library/LoginItems/Tron Server.app/Contents/MacOS/tron"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Verify generated Xcode project stays ignored
        working-directory: ${{ github.workspace }}
        run: |
          test -d packages/mac-app/TronMac.xcodeproj
          git check-ignore -q packages/mac-app/TronMac.xcodeproj

      # Build the TronMac scheme in Debug and compile its unit-test bundle;
      # ad-hoc signing (CODE_SIGN_IDENTITY="-") keeps this portable to any
      # macOS runner without importing the Developer ID certificate.
      #
      # GitHub's hosted app-hosted macOS test runner can wedge before Swift
      # Testing starts. `build-for-testing` still catches Swift compile/link
      # drift in the app + tests without launching the UI process. Run the
      # app-hosted Mac tests locally from Xcode when changing wrapper logic.
      - name: xcodebuild build-for-testing
        timeout-minutes: 15
        env:
          TRON_MAC_TEST_HOST: "1"
        run: |
          set -o pipefail
          destination="platform=macOS,arch=$(uname -m)"
          xcodebuild build-for-testing \
            -project TronMac.xcodeproj \
            -scheme TronMac \
            -destination "$destination" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="-" CODE_SIGN_STYLE=Manual \
            -quiet

      - name: xcodebuild focused wrapper tests
        timeout-minutes: 20
        env:
          TRON_MAC_TEST_HOST: "1"
        run: |
          set -o pipefail
          destination="platform=macOS,arch=$(uname -m)"
          xcodebuild test \
            -project TronMac.xcodeproj \
            -scheme TronMac \
            -destination "$destination" \
            -configuration Debug \
            -only-testing:TronMacTests/TronPathsTests \
            -only-testing:TronMacTests/ServerStatusPollerTests \
            -only-testing:TronMacTests/TailscaleProbeTests \
            CODE_SIGN_IDENTITY="-" CODE_SIGN_STYLE=Manual \
            -quiet

      # Dry-run the DMG build so breakage in release-mac.yml is caught
      # on PR rather than on tag push. We skip notarization + release
      # publish (the forced dry-run mode) by running release-mac.yml's
      # shell steps inline against the debug-signed binary. A real
      # signed DMG only happens on `server-v*` tag pushes.
      - name: Dry-run DMG assembly
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          brew install create-dmg
          mkdir -p build
          xcodebuild \
            -project TronMac.xcodeproj \
            -scheme TronMac \
            -configuration Debug \
            -derivedDataPath build/dd \
            -destination 'generic/platform=macOS' \
            CODE_SIGN_IDENTITY="-" CODE_SIGN_STYLE=Manual \
            -quiet build
          APP_PATH="$(find build/dd -name 'TronMac.app' -print -quit)"
          if [[ -z "$APP_PATH" ]]; then
            echo "::warning::TronMac.app not produced by debug build"
            exit 0
          fi
          test -x "$APP_PATH/Contents/Library/LoginItems/Tron Server.app/Contents/MacOS/tron"
          mkdir -p dist
          # Minimal DMG — layout args can fail without a signing identity.
          create-dmg --volname "Tron Dry-Run" --hdiutil-quiet \
            "dist/Tron-dryrun.dmg" "$APP_PATH" \
            || echo "::warning::create-dmg returned non-zero in dry-run — acceptable without signing"
          ls -la dist/ || true

  # Aggregate gate — branch protection points at this single check.
  # Adding a new required job? List it under `needs:` here too AND add a
  # corresponding line in the script body (skipped jobs from path-gating
  # count as success).
  ci:
    name: CI summary
    runs-on: ubuntu-latest
    needs: [personal-info-guard, version-drift, rust-static-gates, rust, ios, mac]
    if: always()
    env:
      RESULT_GUARD: ${{ needs.personal-info-guard.result }}
      RESULT_VERSION: ${{ needs.version-drift.result }}
      RESULT_STATIC_GATES: ${{ needs.rust-static-gates.result }}
      RESULT_RUST: ${{ needs.rust.result }}
      RESULT_IOS: ${{ needs.ios.result }}
      RESULT_MAC: ${{ needs.mac.result }}
    steps:
      - name: Verify all required jobs passed
        run: |
          fail=0
          # personal-info-guard never path-gates — must be success.
          if [[ "$RESULT_GUARD" != "success" ]]; then
            echo "::error::personal-info-guard: $RESULT_GUARD"; fail=1
          fi
          if [[ "$RESULT_VERSION" != "success" ]]; then
            echo "::error::version-drift: $RESULT_VERSION"; fail=1
          fi
          # Static gates, rust, ios, and mac may be `skipped` by the path filter — treat as success.
          for name in STATIC_GATES RUST IOS MAC; do
            var="RESULT_$name"
            result="${!var}"
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "::error::$name job: $result"; fail=1
            fi
          done
          if [[ $fail -ne 0 ]]; then exit 1; fi
          echo "All required jobs passed (or skipped via path filter)."
